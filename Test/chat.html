    <style>
        :root {
    --primary-color: #0d6efd; --secondary-text: #65676b; --background-gray: #f0f2f5; 
    --white: #fff; --border-color: #ced0d4; --hover-overlay: rgba(0, 0, 0, 0.05);
    --chat-bg: #e9ebee; --my-message-bg: var(--primary-color); --their-message-bg: var(--white);
    --header-height: 60px; --input-area-height: 60px;
    --status-icon-color: #a0a0a0; --status-icon-seen-color: #4fc3f7;
    --chat-bg-image: none; --chat-bg-color: var(--chat-bg);
    --danger-color: #dc3545; --success-color: #198754; --online-color: #31a24c;
    --skeleton-base-color: #eef0f2; --skeleton-shine-color: #f9f9fb;
    --system-message-bg: #e4e6ea; --system-message-color: #65676b;
}

@keyframes slideUpFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
@keyframes typing-bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

html, body { scrollbar-width: none; -ms-overflow-style: none; height: 100svh; margin: 0; padding: 0; overscroll-behavior-y: contain; font-family: 'Cairo', sans-serif; user-select: none; box-sizing: border-box; }
body { position: fixed; inset: 0; background-color: var(--white); display: flex; flex-direction: column; height: 100dvh; padding-top: 10px; box-sizing: border-box; overflow: hidden; }
.hidden { display: none !important; }
.app-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
.view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--white); display: flex; flex-direction: column; transition: transform 0.3s ease-in-out; z-index: 1; }
#chat-list-view { transform: translateX(0%); z-index: 2; }
#chat-room-view { transform: translateX(100%); }
body.room-active #chat-list-view { transform: translateX(-100%); }
body.room-active #chat-room-view { transform: translateX(0%); }

.header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: var(--header-height); flex-shrink: 0; background-color: var(--white); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10; gap: 10px; }
.header .title { font-size: 1.5rem; font-weight: 700; margin-left: auto; text-align: right; }
.header .user-info-clickable { cursor: pointer; display: flex; align-items: center; gap: 10px; flex-grow: 1; margin: 0 10px; overflow: hidden; flex-direction: row; }
.header .actions { display: flex; align-items: center; gap: 8px; }
.header .actions button { background: none; border: none; padding: 8px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.header .actions svg { width: 24px; height: 24px; color: var(--primary-color); }

.chat-list-container { overflow-y: auto; flex-grow: 1; }
.conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background-color 0.2s; position: relative; flex-direction: row; }
.conversation-item:hover { background-color: var(--hover-overlay); }
.avatar-container { position: relative; flex-shrink: 0; }
.avatar-container img, .avatar-container .avatar-placeholder { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background-color: #eee; display: block; }
.online-indicator { width: 15px; height: 15px; border-radius: 50%; background-color: var(--online-color); position: absolute; bottom: 2px; right: 2px; border: 2px solid var(--white); display: none; }
.is-online .online-indicator { display: block; }
.conversation-details { flex: 1; overflow: hidden; text-align: left; }
.conv-username { font-weight: 600; }
.conv-last-message { font-size: 0.9rem; color: var(--secondary-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: start; unicode-bidi: plaintext; }

#search-input { border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 15px; width: 100%; font-family: inherit; font-size: 1rem; text-align: right; }

body.selection-mode .conversation-item { cursor: pointer; padding-left: 60px; }
.selection-checkbox { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; border: 2px solid var(--border-color); border-radius: 50%; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.conversation-item.selected .selection-checkbox { background-color: var(--primary-color); border-color: var(--primary-color); }
.selection-checkbox svg { color: white; width: 18px; height: 18px; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
.conversation-item.selected .selection-checkbox svg { opacity: 1; transform: scale(1); }
.selection-mode-header { flex-shrink: 0; }

.chat-header { flex-direction: row; }
.chat-header .back-btn { padding: 0 10px 0 0; cursor: pointer; border: none; background: none; display: flex; align-items: center; }
.chat-header .back-btn svg { width: 28px; height: 28px; color: var(--primary-color); transform: scaleX(-1); }
.chat-header .avatar-container img, .chat-header .avatar-container .avatar-placeholder { width: 40px; height: 40px; }
.chat-header .online-indicator { width: 10px; height: 10px; bottom: 1px; right: 1px; }
.chat-header .username-details { display: flex; flex-direction: column;  }
.chat-header .username { font-weight: 600; line-height: 1.2; }
.chat-header .typing-indicator { font-size: 0.8rem; color: var(--secondary-text); line-height: 1.2; height: 1.2em; }

#messages-container { position: relative; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; display: flex; flex-direction: column; background-color: var(--chat-bg-color); background-image: var(--chat-bg-image); background-size: cover; background-position: center; transition: background 0.3s; }

.message-wrapper { display: flex; flex-direction: column; margin-bottom: 12px; animation: slideUpFadeIn 0.3s ease-out; order: 1; }
.message-wrapper.new-message { animation: slideUpFadeIn 0.3s ease-out; }
.message-group { display: flex; flex-direction: column; gap: 4px; }
.message-group.mine { align-items: flex-end; justify-content: flex-end; }
.message-group.theirs {  justify-content: flex-start; }
.seen-by-container { display: flex; height: 16px; direction: ltr; padding: 0 10px; margin-top: -2px; }
.message-group.mine .seen-by-container { align-self: flex-end; }
.message-group.theirs .seen-by-container {  margin-left: 40px; }
.seen-receipts-row { display: flex; justify-content: flex-end; padding: 0 10px; height: 18px; margin-bottom: 12px; }
.seen-by-avatar { width: 16px; height: 16px; border-radius: 50%; border: 1px solid white; margin-left: -6px; overflow: hidden; }
.seen-by-avatar > div, .seen-by-avatar > img { width: 100%; height: 100%; }
.seen-by-plus { width: 16px; height: 16px; border-radius: 50%; background-color: #ccc; color: white; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-left: -6px; border: 1px solid white; }

.group-message-container { display: flex; flex-direction: row; align-items: flex-end; gap: 8px; max-width: 90%; }
.message-group.theirs .group-message-container {  }
.message-group.mine .group-message-container { align-self: flex-end; flex-direction: row-reverse; }
.sender-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; align-self: flex-end; }
.avatar-container img { margin: 0 auto; }
.sender-info { font-size: 0.8rem; font-weight: 600; color: var(--secondary-text); margin: 0 0 2px 40px; text-align: left; }
.message-group.theirs .sender-info { text-align: left; }
.message-group.mine .sender-info { text-align: right; }

.system-message-wrapper { text-align: center; margin: 10px 0; order: 1; }
.system-message-bubble { display: inline-block; background-color: var(--system-message-bg); color: var(--system-message-color); padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; }

/* القاعدة الأساسية المشتركة */
.swipe-reply-icon {
    position: absolute;
    top: 50%;
    opacity: 0;
    transition: opacity 0.2s ease-out; /* نعتمد فقط على الشفافية */
    color: var(--secondary-text);
}

/* أيقونة رسائلك (على اليمين، عادية) */
.message-group.mine .swipe-reply-icon {
    right: -40px;
    transform: translateY(-50%);
}

/* أيقونة رسائل صديقك (على اليسار، معكوسة) */
.message-group.theirs .swipe-reply-icon {
    left: -40px;
    transform: translateY(-50%) scaleX(-1); /* <-- السحر هنا، نعكس الأيقونة أفقياً */
}
.message-bubble { max-width: 85%; padding: 8px 12px; word-wrap: break-word; overflow-wrap: break-word; display: flex; flex-direction: column; position: relative; z-index: 1; background-color: white; }
.message-group.mine .message-bubble { background-color: var(--my-message-bg); color: white; border-radius: 18px 18px 4px 18px; }
.message-group.theirs .message-bubble { background-color: var(--their-message-bg); box-shadow: 0 1px 1px rgba(0,0,0,0.05); border-radius: 18px 18px 18px 4px; }
.message-bubble[data-media="true"] { padding: 0; }
.message-content-wrapper { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: flex-end; }
.message-group.theirs .message-content-wrapper { justify-content: flex-start; }
.message-content { margin-bottom: 2px; text-align: right; word-break: break-word; white-space: pre-wrap; padding-right: 8px; margin: 0; }
.message-group.theirs .message-content { padding-left: 8px; padding-right: 0; }
.message-content a { color: inherit; text-decoration: underline; }
.message-meta { font-size: 0.7rem; color: rgba(255, 255, 255, 0.7); display: flex; align-items: center; gap: 3px; margin-left: auto; padding: 0 0 2px 4px; white-space: nowrap; user-select: none; }
.message-group.theirs .message-meta { color: rgba(0,0,0,0.4); margin-left: 0; margin-right: auto; }
.message-status-icon svg { width: 16px; height: 16px; }
.edited-indicator { font-size: 0.65rem; color: inherit; opacity: 0.7; margin-left: 5px; }
.message-image { max-width: 100%; border-radius: 12px; display: block; }
.message-file { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; margin: 5px; text-decoration: none; color: inherit; flex-direction: row; }
.message-file svg { width: 30px; height: 30px; flex-shrink: 0; }
.message-group.mine .message-file { color: white; }
.message-group.theirs .message-file { color: #333; }
.reply-snippet {
    background: rgba(0,0,0,0.08);
    padding: 6px 10px;
    margin: -2px -6px 8px -6px;
    border-radius: 8px;
    border-left: 3px solid var(--primary-color);
    cursor: pointer;
    text-align: left;
    width: fit-content;
    max-width: 100%;
}
#reply-preview-container { padding: 8px 12px; background: var(--background-gray); display: flex; align-items: center; border-bottom: 1px solid var(--border-color); position: relative; flex-direction: row; }
#reply-preview-container::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 4px; background-color: var(--primary-color); border-radius: 0 4px 4px 0; }
.reply-preview-content { font-size: 0.9rem; overflow: hidden; margin: 0 10px; flex-grow: 1; text-align: left; }
.reply-preview-sender { font-weight: bold; color: var(--primary-color); }
.reply-preview-text { color: var(--secondary-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reply-close-btn { cursor: pointer; background: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; padding: 0; color: var(--secondary-text); }

.message-group.theirs .reply-snippet { border-left: 3px solid #acacac; }
.reply-snippet-sender { font-size: 0.8rem; font-weight: 700; color: var(--primary-color); }
.message-group.theirs .reply-snippet-sender { color: #555; }
.reply-snippet-content { font-size: 0.85rem; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.message-group.theirs .reply-snippet-content { color: #333; }

.chat-input-area { z-index: 10; display: flex; flex-direction: column; background: var(--white); border-top: 1px solid var(--border-color); flex-shrink: 0; position: relative; }
.chat-input-row { display: flex; align-items: center; gap: 10px; padding: 10px; min-height: var(--input-area-height); box-sizing: border-box; flex-direction: row; }
#message-input-container { flex: 1; display: flex; align-items: center; background: var(--background-gray); border-radius: 20px; padding: 0 12px; }
#message-input { width: 100%; border: none; background: transparent; padding: 12px 0; resize: none; font-family: inherit; outline: none; max-height: 100px; overflow-y: auto; text-align: right; }
.chat-input-row button { background: none; border: none; cursor: pointer; padding: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.chat-input-row svg { color: var(--primary-color); width: 26px; height: 26px; }
#send-btn svg { transform: scaleX(-1); }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; }
.modal-overlay.visible { opacity: 1; visibility: visible; }
.modal-content { background: var(--white); width: 90%; max-width: 450px; border-radius: 12px; overflow-y: auto; max-height: 90%; transform: scale(0.95); transition: transform 0.2s; box-shadow: 0 5px 25px rgba(0,0,0,0.15); }
.modal-overlay.visible .modal-content { transform: scale(1); }
.modal-body { padding: 8px; }
#new-chat-modal .modal-body { padding: 0; max-height: 70vh; overflow-y: auto; }
.user-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; flex-direction: row; }
.user-list-item:hover { background-color: var(--hover-overlay); }
.user-list-item .avatar-placeholder { width: 48px; height: 48px; }
.user-list-item .username { font-weight: 600; }
.modal-header { text-align: right; padding: 16px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 1.2rem; }
.modal-list-button { display: flex; align-items: center; width: 100%; padding: 14px; background: none; border: none; font-family: inherit; font-size: 1rem; text-align: right; cursor: pointer; border-radius: 8px; flex-direction: row-reverse; justify-content: flex-start; }
.modal-list-button:hover { background-color: var(--hover-overlay); }
.modal-list-button svg { width: 22px; height: 22px; color: #555; margin-left: 12px; }
.modal-list-button.danger { color: var(--danger-color); }
.modal-list-button.danger svg { color: var(--danger-color); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px; border-top: 1px solid var(--border-color); }
.modal-actions button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 600; }
.modal-actions .confirm-btn { background-color: var(--primary-color); color: white; }
.modal-actions .cancel-btn { background-color: var(--background-gray); color: var(--secondary-text); }
#prompt-modal .modal-body { padding: 24px; }
#prompt-modal-input { width: 100%; padding: 12px; font-family: inherit; font-size: 1rem; border-radius: 8px; border: 1px solid var(--border-color); box-sizing: border-box; }

#block-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: #f0f2f5; padding: 20px; text-align: center; color: #65676b; z-index: 12; display: flex; flex-direction: column; gap: 10px; align-items: center; box-sizing: border-box; border-top: 1px solid var(--border-color); }
#unblock-btn { padding: 8px 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }

.theme-colors-palette { display: flex; justify-content: space-around; padding: 8px 14px 14px; }
.theme-color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid #ccc; transition: transform 0.2s; }
.theme-color-swatch:hover { transform: scale(1.1); }
.theme-color-swatch.image-picker { display: flex; align-items: center; justify-content: center; background-color: #f0f2f5; }

#call-modal .modal-content { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; height: 80%; text-align: center; justify-content: space-between; position: relative; background-color: #2c2c2c; color: white; }
#call-modal .caller-info { z-index: 10; }
#call-modal .caller-info .avatar-placeholder { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; }
#call-modal .caller-name { font-size: 1.8rem; font-weight: 700; }
#call-modal .call-status { font-size: 1rem; color: #eee; }
#call-modal .call-actions { display: flex; gap: 20px; z-index: 10; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); }
#call-modal .call-actions button { border-radius: 50%; width: 64px; height: 64px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: rgba(255,255,255,0.2); transition: background-color 0.2s; }
#call-modal .call-actions button:hover { background-color: rgba(255,255,255,0.3); }
#call-modal .call-actions button.toggled { background-color: var(--white); }
#call-modal .call-actions button.toggled svg { color: #333; }
#call-modal .call-actions button svg { width: 32px; height: 32px; color: white; }
#call-accept-btn { background-color: var(--success-color); }
#call-decline-btn { background-color: var(--danger-color); }

.recording-indicator { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background-color: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 10px; z-index: 100; transition: all 0.3s; pointer-events: none; flex-direction: row-reverse; opacity: 0; visibility: hidden; }
.recording-indicator.visible { opacity: 1; visibility: visible; }
.recording-indicator.cancel { background-color: var(--danger-color); transform: translateX(-50%) scale(1.1); }
.recording-indicator::before { content: ''; width: 10px; height: 10px; background-color: var(--danger-color); border-radius: 50%; animation: pulse 1.5s infinite; }
.recording-indicator.cancel::before { display: none; }

.skeleton { animation: shimmer 2s infinite; background: linear-gradient(to right, var(--skeleton-base-color) 4%, var(--skeleton-shine-color) 25%, var(--skeleton-base-color) 36%); background-size: 1000px 100%; }
#app-loader { width: 100%; height: 100%; display: flex; flex-direction: column; }
.skeleton-header { height: var(--header-height); padding: 0 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
.skeleton-header-icon { width: 32px; height: 32px; border-radius: 50%; }
.skeleton-header-title { width: 100px; height: 24px; border-radius: 8px; }
.skeleton-header-search { flex-grow: 1; height: 36px; border-radius: 18px; }
.skeleton-loader { padding: 10px 16px; width: 100%; box-sizing: border-box; flex-grow: 1; overflow: hidden; }
.skeleton-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
.skeleton-avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
.skeleton-text { flex: 1; }
.skeleton-line { height: 1.2em; border-radius: 4px; }
.skeleton-line.short { width: 60%; margin-top: 8px; height: 1em; }
#messages-skeleton { padding: 10px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column-reverse; flex-grow: 1; overflow: hidden; }
.skeleton-msg-wrapper { display: flex; margin-bottom: 10px; }
.skeleton-msg { width: 60%; height: 40px; border-radius: 18px; }
.skeleton-msg-wrapper.mine { justify-content: flex-end; }
.skeleton-msg-wrapper.theirs { justify-content: flex-start; }

.video-thumbnail-wrapper { position: relative; cursor: pointer; max-width: 100%; border-radius: 12px; overflow: hidden; }
.video-thumbnail-wrapper video { display: block; width: 100%; border-radius: 12px; }
.video-play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background-color: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.video-play-button svg { color: white; width: 30px; height: 30px; margin-left: 4px; }

/* --- إصلاح نهائي لمشغل الصوت --- */

.custom-audio-player {
    position: relative; /* مهم جدًا لتثبيت شريط التقدم بداخله */
    display: flex;
    align-items: center;
    gap: 8px;
    width: 250px;
    padding: 5px;
}

.audio-progress-bar {
    flex-grow: 1;
    background: rgba(255, 255, 255, 0.3);
    height: 4px;
    border-radius: 2px;
    cursor: pointer;
    position: relative; /* مهم جدًا لتثبيت الشريط الملون بداخله */
    overflow: hidden; /* يضمن عدم خروج الشريط الملون عن الإطار */
}
.message-group.theirs .audio-progress-bar {
    background: rgba(0, 0, 0, 0.1);
}

.audio-progress {
    position: absolute; /* يجعله يطفو فوق الشريط الرمادي */
    left: 0;
    top: 0;
    background: var(--white);
    height: 100%;
    width: 0; /* سيتغير بواسطة JS */
    border-radius: 2px;
    pointer-events: none; /* يمنعه من اعتراض النقر */
}
.message-group.theirs .audio-progress {
    background: var(--primary-color);
}
.audio-play-pause-btn { background: var(--white); color: var(--primary-color); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }
.message-group.theirs .audio-play-pause-btn { background: var(--primary-color); color: var(--white); }
.audio-progress-bar { flex-grow: 1; background: rgba(255,255,255,0.3); height: 4px; border-radius: 2px; cursor: pointer; }
.message-group.theirs 
.audio-progress-bar {

}
.audio-progress { background: var(--white); height: 100%; width: 0; border-radius: 2px; }
.message-group.theirs .audio-progress { background: var(--primary-color); }
.audio-time { font-size: 0.75rem; min-width: 35px; text-align: center; }

#video-streams { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #2c2c2c; }
#remote-video, #local-video { max-width: 100%; max-height: 100%; border-radius: 8px; position: absolute; transition: all 0.3s ease; }
#remote-video { width: 100%; height: 100%; object-fit: cover; }
#local-video { bottom: 120px; right: 20px; width: 100px; border: 2px solid white; z-index: 10; }
#audio-streams { display: none; }

#dynamic-typing-indicator .message-group.theirs {  order: 2; }
#dynamic-typing-indicator .message-bubble { background-color: var(--their-message-bg); box-shadow: 0 1px 1px rgba(0,0,0,0.05); border-radius: 18px 18px 18px 4px; padding: 10px 12px; }
.typing-dots span { display: inline-block; width: 8px; height: 8px; background-color: #8d949e; border-radius: 50%; margin: 0 2px; animation: typing-bounce 1.4s infinite ease-in-out both; }
.typing-dots span:nth-of-type(1) { animation-delay: -0.32s; }
.typing-dots span:nth-of-type(2) { animation-delay: -0.16s; }
.typing-dots span:nth-of-type(3) { animation-delay: 0s; }

.toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.75); color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; font-size: 0.9rem; transition: bottom 0.5s ease-in-out; }
.toast.show { bottom: 80px; }

#VISIBLE_RED_SENSOR { position: absolute !important; bottom: 0 !important; left: 0 !important; width: 100% !important; height: 50px !important; background: rgba(220, 53, 69, 0.7) !important; border: 3px solid yellow !important; z-index: 99999 !important; color: white !important; font-weight: bold !important; font-size: 18px !important; text-align: center !important; line-height: 50px !important; pointer-events: none !important; }

.highlight { background-color: #FFD700; border-radius: 3px; padding: 0 2px; }
.highlight.active { background-color: #FFA500; }

#new-message-preview { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(150%); width: 90%; max-width: 400px; z-index: 9999; background-color: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px); border: 1px solid #e0e0e0; border-radius: 25px; padding: 8px 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer; display: flex; align-items: center; gap: 10px; opacity: 0; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s; pointer-events: none; }
#new-message-preview.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
#preview-avatar .avatar-placeholder, #preview-avatar img { width: 32px; height: 32px; border-radius: 50%; }
#preview-content { flex-grow: 1; overflow: hidden; text-align: right; }
#preview-sender { font-weight: 700; font-size: 0.9rem; color: var(--primary-color); }
#preview-text { font-size: 0.85rem; color: var(--secondary-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: start; unicode-bidi: plaintext; }
#preview-down-arrow svg { width: 24px; height: 24px; color: var(--secondary-text); }
#new-message-count { position: absolute; top: -4px; right: -4px; background-color: var(--danger-color); color: white; font-size: 11px; font-weight: bold; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--white); }
#new-message-preview.arrow-only { width: 44px; height: 44px; padding: 0; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
#new-message-preview.arrow-only #preview-avatar, #new-message-preview.arrow-only #preview-content, #new-message-preview.arrow-only #new-message-count { display: none; }
#new-message-preview.arrow-only #preview-down-arrow { display: flex; margin: 0; }

#pagination-loader { order: 0; display: block; opacity: 0; height: 0px; text-align: center; }

const linkify = (text) => {
    const urlRegex = /(https?:\/\/[^\s"'<>()]+)/g;
    return text.replace(urlRegex, (url) => `<a href="${url}" target="" rel="noopener noreferrer">${url}</a>`);
};

const debounce = (func, delay) => {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
    };
};

const LocalStorageManager = {
    load: () => {
        try {
            localState.deletedMessages = JSON.parse(localStorage.getItem('deleted_messages')) || {};
            localState.hiddenChats = JSON.parse(localStorage.getItem('hidden_chats')) || [];
        } catch (e) {
            localState = { hiddenChats: [], deletedMessages: {} };
        }
    },
    saveDeletedMessages: () => {
        localStorage.setItem('deleted_messages', JSON.stringify(localState.deletedMessages));
    },
    saveHiddenChats: () => {
        localStorage.setItem('hidden_chats', JSON.stringify(localState.hiddenChats));
    }
};

const MessageInteractionHandler = {
    longPressTimer: null,
    isDragging: false,
    startX: 0,
    startY: 0,
    currentX: 0,
    isSwipingHorizontally: false,
    targetWrapper: null,
    targetMessage: null,
    
    onPointerDown: (e, wrapper, message) => {
        if (e.target.closest('a, button, audio, video, .custom-audio-player')) return;

        MessageInteractionHandler.isDragging = false;
        MessageInteractionHandler.isSwipingHorizontally = false;
        MessageInteractionHandler.targetWrapper = wrapper;
        MessageInteractionHandler.targetMessage = message;
        MessageInteractionHandler.startX = e.touches ? e.touches[0].clientX : e.clientX;
        MessageInteractionHandler.startY = e.touches ? e.touches[0].clientY : e.clientY;
        MessageInteractionHandler.currentX = MessageInteractionHandler.startX;

        MessageInteractionHandler.longPressTimer = setTimeout(() => {
            if (!MessageInteractionHandler.isDragging) {
                ChatRoom.showMessageOptions(message);
            }
            MessageInteractionHandler.longPressTimer = null;
        }, 500);

        document.addEventListener('mousemove', MessageInteractionHandler.onPointerMove, { passive: false });
        document.addEventListener('touchmove', MessageInteractionHandler.onPointerMove, { passive: false });
        
        document.addEventListener('mouseup', MessageInteractionHandler.onPointerUp, { once: true });
        document.addEventListener('touchend', MessageInteractionHandler.onPointerUp, { once: true });
    },

    // داخل كائن MessageInteractionHandler
onPointerMove: (e) => {
    if (!MessageInteractionHandler.targetWrapper) return;

    const currentX = e.touches ? e.touches[0].clientX : e.clientX;
    const currentY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // حفظ القيمة الحالية
    MessageInteractionHandler.currentX = currentX;

    // ... باقي الكود يبقى كما هو
    const deltaX = currentX - MessageInteractionHandler.startX;
    const deltaY = Math.abs(currentY - MessageInteractionHandler.startY);

    if (!MessageInteractionHandler.isDragging) {
        if (Math.abs(deltaX) > 10 || deltaY > 10) {
            MessageInteractionHandler.isDragging = true;
            if (MessageInteractionHandler.longPressTimer) {
                clearTimeout(MessageInteractionHandler.longPressTimer);
                MessageInteractionHandler.longPressTimer = null;
            }
            if (Math.abs(deltaX) > deltaY + 5) {
                MessageInteractionHandler.isSwipingHorizontally = true;
                MessageInteractionHandler.targetWrapper.style.transition = 'none';
            }
        }
    }

    if (MessageInteractionHandler.isSwipingHorizontally) {
        e.preventDefault();
        const isMine = MessageInteractionHandler.targetWrapper.querySelector('.message-group').classList.contains('mine');
        let constrainedDeltaX = deltaX;

        if ((isMine && deltaX > 0) || (!isMine && deltaX < 0)) {
            constrainedDeltaX = 0;
        }
        constrainedDeltaX = Math.max(-80, Math.min(80, constrainedDeltaX));

        const replyIcon = MessageInteractionHandler.targetWrapper.querySelector('.swipe-reply-icon');
        MessageInteractionHandler.targetWrapper.style.transform = `translateX(${constrainedDeltaX}px)`;
        
        if (replyIcon) {
            const progress = Math.abs(constrainedDeltaX) / 60;
            replyIcon.style.opacity = Math.min(1, progress);
            replyIcon.style.transform = `translateY(-50%) scale(${Math.min(1, progress)})${isMine ? '' : ' scaleX(-1)'}`;
        }
    }
},

    // داخل كائن MessageInteractionHandler
onPointerUp: () => {
    if (!MessageInteractionHandler.targetWrapper) return;
    
    // هذا السطر مهم جدًا لحفظ آخر موضع للسحب
    const finalX = MessageInteractionHandler.currentX;

    if (MessageInteractionHandler.longPressTimer) {
        clearTimeout(MessageInteractionHandler.longPressTimer);
        MessageInteractionHandler.longPressTimer = null;
        if (!MessageInteractionHandler.isDragging) {
             MessageInteractionHandler.targetWrapper.classList.toggle('meta-visible');
        }
    }

    if (MessageInteractionHandler.isSwipingHorizontally) {
        const deltaX = finalX - MessageInteractionHandler.startX;
        const isMine = MessageInteractionHandler.targetWrapper.querySelector('.message-group').classList.contains('mine');
        const threshold = 60;
        
        // الشرط المصحح
        if ((isMine && deltaX < -threshold) || (!isMine && deltaX > threshold)) {
            UI.showReplyPreview(MessageInteractionHandler.targetMessage);
        }

        MessageInteractionHandler.targetWrapper.style.transition = 'transform 0.3s ease';
        MessageInteractionHandler.targetWrapper.style.transform = 'translateX(0)';
        const replyIcon = MessageInteractionHandler.targetWrapper.querySelector('.swipe-reply-icon');
        if(replyIcon) {
            replyIcon.style.opacity = 0;
            replyIcon.style.transform = `translateY(-50%) scale(0)`;
        }
    }

    document.removeEventListener('mousemove', MessageInteractionHandler.onPointerMove);
    document.removeEventListener('touchmove', MessageInteractionHandler.onPointerMove);
    
    MessageInteractionHandler.targetWrapper = null;
    MessageInteractionHandler.targetMessage = null;
}
};

const UI = {
    show: (id) => document.getElementById(id)?.classList.remove('hidden'),
    hide: (id) => document.getElementById(id)?.classList.add('hidden'),
    loader: (show = true) => (show ? (UI.show('app-loader'), UI.hide('app-container')) : (UI.hide('app-loader'), UI.show('app-container'))),
openModal: (id) => {
    const modal = document.getElementById(id);
    if (!modal || modal.classList.contains('visible')) return;

    const currentlyVisibleModal = document.querySelector('.modal-overlay.visible');
    
    modal.classList.add('visible');

    if (currentlyVisibleModal) {
        history.replaceState({ ...history.state, modalOpen: true, modalId: id }, "", window.location.href);
    } else {
        history.pushState({ ...history.state, modalOpen: true, modalId: id }, "", window.location.href);
    }
},
closeModal: (id) => {
    const modal = document.getElementById(id);
    if (modal && modal.classList.contains('visible')) {
        history.back();
    }
},
    // داخل كائن UI
scrollToBottom: (behavior = 'smooth') => {
    const el = document.getElementById('messages-container');
    if (!el) return;

    // أوقف أي هجوم سابق (احتياطي)
    isForceScrolling = false;

    // ابدأ الهجوم الجديد
    isForceScrolling = true;

    // تعريف حلقة الهجوم
    function scrollLoop() {
        // إذا أعطى المستخدم أمر الإيقاف، توقف فورًا
        if (!isForceScrolling) return;

        // استمر في الهجوم على أسفل الصفحة بقوة
        el.scrollTo({ top: el.scrollHeight, behavior: 'auto' });

        // اطلب الإطار التالي لمواصلة الهجوم
        requestAnimationFrame(scrollLoop);
    }

    // أطلق الطلقة الأولى من الهجوم
    requestAnimationFrame(scrollLoop);
},

// داخل كائن UI
showConfirm: (message) => {
    return new Promise(resolve => {
        const dialog = document.getElementById('confirm-modal');
        dialog.querySelector('#confirm-modal-text').textContent = message;
        const confirmBtn = dialog.querySelector('#confirm-modal-confirm');
        const cancelBtn = document.querySelector('#confirm-modal-cancel');

        let observer;

        const cleanupAndResolve = (result) => {
            // أوقف المراقب
            if (observer) observer.disconnect();
            
            // أزل المستمعين
            confirmBtn.removeEventListener('click', confirmHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
            
            // أغلق النافذة إذا لم تكن مغلقة بالفعل
            if (dialog.classList.contains('visible')) {
                 UI.closeModal('confirm-modal');
            }
            
            // أرجع النتيجة
            resolve(result);
        };

        const confirmHandler = () => cleanupAndResolve(true);
        const cancelHandler = () => cleanupAndResolve(false);

        confirmBtn.addEventListener('click', confirmHandler, { once: true });
        cancelBtn.addEventListener('click', cancelHandler, { once: true });
        
        // المراقب الذكي: يراقب تغييرات الـ class على النافذة
        // إذا اختفى class 'visible'، فهذا يعني أنها أُغلقت (بسبب زر الرجوع أو الضغط الخارجي)
        observer = new MutationObserver((mutations) => {
            if (!dialog.classList.contains('visible')) {
                // النافذة أغلقت بوسيلة أخرى، اعتبرها "إلغاء"
                cleanupAndResolve(false);
            }
        });
        
        observer.observe(dialog, { attributes: true, attributeFilter: ['class'] });

        UI.openModal('confirm-modal');
    });
},
    showPrompt: (title, defaultValue, onConfirm) => {
        const dialog = document.getElementById('prompt-modal');
        dialog.querySelector('#prompt-modal-header').textContent = title;
        const input = dialog.querySelector('#prompt-modal-input');
        input.value = defaultValue || '';
        const confirmBtn = dialog.querySelector('#prompt-modal-confirm');
        const cancelBtn = dialog.querySelector('#prompt-modal-cancel');
        const confirmHandler = () => { onConfirm(input.value); cleanup(); };
        const cancelHandler = () => cleanup();
        const cleanup = () => {
            UI.closeModal('prompt-modal');
            confirmBtn.removeEventListener('click', confirmHandler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        confirmBtn.addEventListener('click', confirmHandler, { once: true });
        cancelBtn.addEventListener('click', cancelHandler, { once: true });
        UI.openModal('prompt-modal');
    },
    createAvatar: (user, size) => {
        const avatarClass = "avatar-placeholder";
        if (user && user.avatar_url) {
            return `<img src="${user.avatar_url}" width="${size}" height="${size}" style="width:${size}px; height:${size}px; border-radius:50%; object-fit: cover;">`;
        }
        const initial = (user && (user.first_name || user.username)) ? (user.first_name || user.username).charAt(0).toUpperCase() : 'U';
        const colors = ['#0d6efd', '#6f42c1', '#d63384', '#dc3545', '#fd7e14', '#198754'];
        const colorIndex = (initial.charCodeAt(0) % colors.length);
        const bgColor = colors[colorIndex];
        return `<div class="${avatarClass}" style="width:${size}px; height:${size}px; border-radius:50%; background-color:${bgColor}; color:white; display:flex; align-items:center; justify-content:center; font-size:${size/2}px; font-weight:bold;">${initial}</div>`;
    },
    
    
    
// داخل كائن UI
createMessageElement: (message, previousMessage, nextMessage) => {
    if (message.type === 'system') {
        const systemWrapper = document.createElement('div');
        systemWrapper.className = 'system-message-wrapper';
        systemWrapper.innerHTML = `<div class="system-message-bubble">${message.content}</div>`;
        return systemWrapper;
    }

    const isMine = message.user_id === currentUser.id;
    const isGroup = currentChatObject && currentChatObject.is_group;
    const senderProfile = isGroup ? currentChatObject.participants.find(p => p && p.id === message.user_id) : null;

    const showName = !isMine && isGroup && (!previousMessage || previousMessage.user_id !== message.user_id || previousMessage.type === 'system');
    const showAvatar = !isMine && isGroup && (!nextMessage || nextMessage.user_id !== message.user_id || nextMessage.type === 'system');

    const nameHTML = showName && senderProfile ? `<div class="sender-info">${App.getUserDisplayName(senderProfile.id)}</div>` : '';
    let avatarHTML = '';
    if (isGroup && !isMine) {
        avatarHTML = showAvatar && senderProfile ? `<div class="sender-avatar" style="cursor: pointer;">${UI.createAvatar(senderProfile, 32)}</div>` : `<div class="sender-avatar" style="visibility: hidden;"></div>`;
    }

    const time = new Date(message.created_at || Date.now()).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    const editedIndicator = message.is_edited ? `<span class="edited-indicator">(تم التعديل)</span>` : '';
    let statusHTML = '';
    if (isMine) {
        const statusKey = message.status || (message.temp_id ? 'sending' : 'sent');
        statusHTML = `<span class="message-status-icon">${Icons.status[statusKey] || Icons.status.sent}</span>`;
    }
    const metaHTML = `<div class="message-meta"><span>${time}</span>${editedIndicator}${statusHTML}</div>`;
    let contentHTML = '';
    switch (message.type) {
        case 'image': contentHTML = `<img src="${message.file_url}" class="message-image" loading="lazy">`; break;
        case 'video': contentHTML = `<div class="video-thumbnail-wrapper"><video src="${message.file_url}#t=0.1" preload="metadata"></video><div class="video-play-button"></div></div>`; break;
        case 'audio': contentHTML = AudioManager.createAudioPlayerHTML(message.file_url); break;
        default: contentHTML = `<span class="message-content">${linkify(message.content || '')}</span>`; break;
    }

    let replySnippetHTML = '';
    if (message.replied_message) {
        const replied = message.replied_message;
        const repliedSenderName = App.getUserDisplayName(replied.user_id);
        const repliedContent = replied.type === 'text' ? replied.content : 'ملف وسائط';
        replySnippetHTML = `<div class="reply-snippet" onclick="App.scrollToMessage(${replied.id})"><div class="reply-snippet-sender">${repliedSenderName}</div><div class="reply-snippet-content">${repliedContent}</div></div>`;
    }

    const forwardedIndicator = message.is_forwarded ? `<div style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="transform: scaleX(-1);"><path d="M12,8L16,12L12,16V13H8V11H12V8M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" /></svg><span>معاد توجيهها</span></div>` : '';
    const pinnedIndicator = message.is_pinned ? `<div style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16,12V4H17V2H7V4H8V12L6,14V16H11.5V22H12.5V16H18V14L16,12Z" /></svg><span>مثبتة</span></div>` : '';

    let messageBubbleHTML = '';
    if (message.type === 'text' || message.type === 'audio') {
        messageBubbleHTML = `<div class="message-bubble">${pinnedIndicator}${forwardedIndicator}${replySnippetHTML}<div class="message-content-wrapper">${contentHTML}${metaHTML}</div></div>`;
    } else {
        messageBubbleHTML = `<div class="message-bubble" data-media="true">${pinnedIndicator}${forwardedIndicator}${replySnippetHTML}<div class="media-wrapper">${contentHTML}</div><div class="message-content-wrapper" style="padding: 0 4px 2px;">${metaHTML}</div></div>`;
    }
    const groupClass = isMine ? 'mine' : 'theirs';

    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper';
    wrapper.dataset.messageId = message.id || `temp-${message.temp_id}`;
    
    wrapper.innerHTML = `
        ${nameHTML}
        <div class="message-group ${groupClass}">
            <div class="group-message-container">
                ${avatarHTML}
                ${messageBubbleHTML}
            </div>
            <div class="seen-by-list hidden"></div>
            <div class="swipe-reply-icon">${Icons.reply}</div>
        </div>
    `;

    if (showAvatar && senderProfile) {
        const avatarElement = wrapper.querySelector('.sender-avatar');
        if (avatarElement) {
            const iAmAdmin = currentUser.id === currentChatObject.created_by;
            avatarElement.onclick = () => App.showMemberOptions(senderProfile, iAmAdmin);
        }
    }
    if (message.type === 'audio') {
        const playerElement = wrapper.querySelector('.custom-audio-player');
        if (playerElement) AudioManager.initPlayer(playerElement);
    }
    
    ChatRoom.setupMessageBubbleEvents(wrapper, message);
    return wrapper;
},


getMessageStatusText: (message) => {
    if (currentChatObject.is_group) return '';
    if (message.status === 'sending' || message.temp_id) {
        return 'جاري الإرسال';
    }
    if (message.status === 'seen') {
        return 'شوهد';
    }
    if (chatPartner && onlineUsers.has(chatPartner.id)) {
        return 'تم التسليم';
    }
    return 'تم الإرسال';
},



    updateMessageStatus: (messageId, newStatus) => {
    const msgElement = document.querySelector(`[data-message-id="${messageId}"]`);
    if (!msgElement) return;

    const msg = currentChatState.messages.find(m => m.id == messageId);
    if (msg) {
        msg.status = newStatus;
    }

    const statusTextElement = msgElement.querySelector('.message-status-text');
    if (statusTextElement && msg) {
        statusTextElement.textContent = UI.getMessageStatusText(msg);
    }
},



// داخل كائن UI
addMessage: (message, messagesMap) => {
    if (localState.deletedMessages[message.id]) return;
    const container = document.getElementById('messages-container');
    const messageId = message.id || `temp-${message.temp_id}`;
    
    const previousMessage = currentChatState.messages[currentChatState.messages.length - 2] || null;
    const newElement = UI.createMessageElement(message, previousMessage, null);

    if (previousMessage && previousMessage.user_id === message.user_id && previousMessage.type !== 'system') {
        const prevElement = messagesMap.get(previousMessage.id);
        if (prevElement) {
            const messageBeforePrevious = currentChatState.messages[currentChatState.messages.length - 3] || null;
            const updatedPrevElement = UI.createMessageElement(previousMessage, messageBeforePrevious, message);
            prevElement.replaceWith(updatedPrevElement);
            messagesMap.set(previousMessage.id, updatedPrevElement);
        }
    }

    if (messagesMap.has(messageId)) {
        const existingElement = messagesMap.get(messageId);
        existingElement.replaceWith(newElement);
    } else {
        newElement.classList.add('new-message');
        container.appendChild(newElement);
    }
    messagesMap.set(messageId, newElement);
},



    prependMessages: (messages, container, messagesMap) => {
        const oldScrollHeight = container.scrollHeight;
        const fragment = document.createDocumentFragment();
        const visibleMessages = messages.filter(msg => !localState.deletedMessages[msg.id]);
        visibleMessages.forEach(msg => {
            const newElement = UI.createMessageElement(msg);
            fragment.appendChild(newElement);
            messagesMap.set(msg.id, newElement);
        });
        container.appendChild(fragment);
        
        container.scrollTop -= (container.scrollHeight - oldScrollHeight);
    },



renderInitialMessages: (messages, messagesMap) => {

    container.innerHTML = `<div id="pagination-loader" class="hidden">...</div><div id="dynamic-typing-indicator" class="message-wrapper hidden"></div>`;
    messagesMap.clear();

    const visibleMessages = messages.filter(msg => !localState.deletedMessages[msg.id]);
    
    // الترتيب معكوس في الشاشة (column-reverse)، لذا الرسائل المجاورة معكوسة
    visibleMessages.forEach((msg, index) => {
        const previousMessage = visibleMessages[index + 1] || null;
        const nextMessage = visibleMessages[index - 1] || null;
        const messageElement = UI.createMessageElement(msg, previousMessage, nextMessage);
        fragment.appendChild(messageElement);
        messagesMap.set(msg.id, messageElement);
    });

    container.prepend(fragment);
    
    UI.scrollToBottom();
},

                e.preventDefault();

                longPressTimer = null;
            }, 500);

        const cancelPress = (e) => { e.preventDefault();
            if (isDragging) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            if (longPressTimer && !isDragging) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                App.handleConversationClick(chat.id, chat);
            }
        };

        const handleDrag = () => {
            isDragging = true;
            clearTimeout(longPressTimer);
        };

        item.addEventListener('mousedown', startPress);
        item.addEventListener('touchstart', startPress, { passive: false });
        item.addEventListener('mouseup', cancelPress);
        item.addEventListener('touchend', cancelPress);
        item.addEventListener('touchmove', handleDrag);
        item.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

        container.appendChild(item);
    });

},

// أضفها داخل كائن UI
formatDateSeparator: (dateString) => {
    const date = new Date(dateString);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);

    // تجاهل الوقت للمقارنة
    today.setHours(0, 0, 0, 0);
    yesterday.setHours(0, 0, 0, 0);
    date.setHours(0, 0, 0, 0);

    if (date.getTime() === today.getTime()) {
        return 'اليوم';
    }
    if (date.getTime() === yesterday.getTime()) {
        return 'الأمس';
    }
    // تنسيق التواريخ الأقدم
    return new Intl.DateTimeFormat('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' }).format(new Date(dateString));
},

        const rootStyle = document.documentElement.style;
        if (type === 'color') {
            rootStyle.setProperty('--chat-bg-color', value);
            rootStyle.setProperty('--chat-bg-image', 'none');
            localStorage.setItem(`chat_theme_${currentChatId}`, JSON.stringify({type: 'color', value}));
        } else if (type === 'image') {
            rootStyle.setProperty('--chat-bg-color', 'var(--chat-bg)');
            rootStyle.setProperty('--chat-bg-image', `url(${value})`);
            localStorage.setItem(`chat_theme_${currentChatId}`, JSON.stringify({type: 'image', value}));
        }
    },

setNickname: (target) => {
    const isPartner = target === 'partner' && chatPartner;
    const userToUpdate = isPartner ? chatPartner : currentUser;
    if (!userToUpdate) return;
    
    const title = target === 'partner' 
        ? `تعديل كنية ${App.getUserDisplayName(chatPartner.id)}`
        : `تعديل كنيتي في هذه المحادثة`;
    const currentNickname = currentChatState.nicknames[userToUpdate.id] || '';
    
    const modalToClose = currentChatObject.is_group ? 'group-settings-modal' : 'chat-settings-modal';
    UI.closeModal(modalToClose);

    setTimeout(() => {
        UI.showPrompt(title, currentNickname, async (newNickname) => {
            const trimmedNickname = newNickname.trim();
            const upsertData = { chat_id: currentChatId, user_id: userToUpdate.id, nickname: trimmedNickname };
            let error;

            if (trimmedNickname === '') {
                const { error: deleteError } = await client.from('chat_nicknames').delete().match({ chat_id: currentChatId, user_id: userToUpdate.id });
                error = deleteError;
            } else {
                const { error: upsertError } = await client.from('chat_nicknames').upsert(upsertData);
                error = upsertError;
            }

            if (error) {
                console.error('Error setting nickname:', error);
                UI.showToast("فشل تحديث الكنية.");
            } else {
                // بعد النجاح، قم بالتحديث محلياً وأخبر الآخرين
                currentChatState.nicknames[userToUpdate.id] = trimmedNickname || null;
                App.refreshCurrentChatUI();
                App.redrawAllVisibleMessages();

                // ▼▼▼ هذا هو السطر الجديد الذي "يصرخ" بالخبر ▼▼▼
                if (chatUpdatesChannel) {
                    chatUpdatesChannel.send({
                        type: 'broadcast',
                        event: 'nickname-changed',
                        payload: {
                            chat_id: currentChatId,
                            user_id: userToUpdate.id,
                            nickname: trimmedNickname || null
                        }
                    });
                }
            }
        });
    }, 100);
},


// داخل كائن ChatSettings
toggleBlock: async () => {
    if (!chatPartner) return;
    const partnerName = `${chatPartner.first_name || ''} ${chatPartner.last_name || ''}`.trim() || chatPartner.username;

    if (currentChatState.isBlocked) {
        // [إلغاء الحظر] - هذا الجزء لا يحتاج لسؤال ويعمل بشكل صحيح
        UI.closeModal('chat-settings-modal');
        // ... (باقي كود إلغاء الحظر المتفائل)
        const oldIsBlocked = currentChatState.isBlocked;
        currentChatState.isBlocked = false;
        UI.updateBlockUI();
        UI.showToast('تم إلغاء الحظر');
        const { error } = await client.from('blocked_users').delete().match({ blocker_id: currentUser.id, blocked_id: chatPartner.id });
        if (error) { /* ... handle error ... */ }

    } else {
        // --- [تنفيذ الحظر بمنطق الاستبدال الصحيح] ---

        // ✅ الخطوة 1: أغلق نافذة الإعدادات الحالية فوراً.
        UI.closeModal('chat-settings-modal');

        // نستخدم تأخير بسيط جداً للسماح للمتصفح بمعالجة إغلاق النافذة الأولى
        // قبل أن نفتح النافذة الثانية. هذا يمنع أي سباق للأحداث.
        setTimeout(async () => {
            // ✅ الخطوة 2: الآن، بعد أن أُغلقت نافذة الإعدادات، افتح نافذة التأكيد.
            const confirmed = await UI.showConfirm(`هل أنت متأكد من حظر ${partnerName}?`);

            // ✅ الخطوة 3: إذا وافق المستخدم، قم بتنفيذ الحظر.
            // (إذا ألغى المستخدم، لن يحدث شيء، وسيبقى في قائمة المحادثات، وهو السلوك الصحيح)
            if (confirmed) {
                const oldIsBlocked = currentChatState.isBlocked;
                currentChatState.isBlocked = true;
                UI.updateBlockUI(); // هذا التحديث لن يراه المستخدم لكنه مهم لحالة التطبيق
                UI.showToast('تم الحظر');
                
                const { error } = await client.from('blocked_users').insert({ blocker_id: currentUser.id, blocked_id: chatPartner.id });
                if (error) {
                    console.error("Failed to block user:", error);
                    currentChatState.isBlocked = oldIsBlocked;
                    UI.updateBlockUI();
                    UI.showToast('فشل الحظر، يرجى المحاولة مرة أخرى.');
                }
            }
        }, 100); // تأخير 100 ميلي ثانية كافي جداً
    }
},

const ChatRoom = {
	// داخل كائن ChatRoom
setupMessageBubbleEvents: (wrapper, message) => {
    const targetElement = wrapper.querySelector('.message-bubble');
    if (!targetElement) return;

    targetElement.onclick = async () => {
        if (!currentChatObject || !currentChatObject.is_group || String(message.id).startsWith('temp-')) {
            return;
        }

        const seenListDiv = wrapper.querySelector('.seen-by-list');
        if (!seenListDiv) return;

        const isCurrentlyVisible = !seenListDiv.classList.contains('hidden');
        const isAutoUpdating = wrapper.classList.contains('auto-updating-seen');

        if (isCurrentlyVisible && !isAutoUpdating) {
            seenListDiv.classList.add('hidden');
            return;
        }

        if (seenListDiv.dataset.populated !== 'true') {
            seenListDiv.textContent = 'جاري التحميل...';
            seenListDiv.classList.remove('hidden');

            try {
                const { data: receipts, error } = await client
                    .from('message_receipts')
                    .select('user_id')
                    .eq('message_id', message.id);

                if (error) throw error;

                const viewerIds = receipts.map(r => r.user_id).filter(id => id !== message.user_id);

                if (viewerIds.length === 0) {
                    seenListDiv.textContent = "شوهد من قبلك فقط";

const SwipeHandler = {
    startX: 0,
    currentX: 0,
    isSwiping: false,
    targetWrapper: null,
    targetGroup: null,
    targetMessage: null,
    replyIcon: null,
    isMine: false,
    threshold: 80,

    start: (e, wrapper, message) => {
        if (SwipeHandler.isSwiping) return;
        
        SwipeHandler.isSwiping = true;
        SwipeHandler.startX = e.touches ? e.touches[0].clientX : e.clientX;
        SwipeHandler.currentX = SwipeHandler.startX;
        SwipeHandler.targetWrapper = wrapper;
        SwipeHandler.targetGroup = wrapper.querySelector('.message-group');
        SwipeHandler.targetMessage = message;
        SwipeHandler.isMine = SwipeHandler.targetGroup.classList.contains('mine');
        SwipeHandler.replyIcon = SwipeHandler.targetGroup.querySelector('.swipe-reply-icon');

        document.addEventListener('mousemove', SwipeHandler.move, { passive: false });
        document.addEventListener('touchmove', SwipeHandler.move, { passive: false });
    },

    move: (e) => {
        if (!SwipeHandler.isSwiping) return;
        e.preventDefault();
        
        SwipeHandler.currentX = e.touches ? e.touches[0].clientX : e.clientX;
        let deltaX = SwipeHandler.currentX - SwipeHandler.startX;

        if ((SwipeHandler.isMine && deltaX > 0) || (!SwipeHandler.isMine && deltaX < 0)) {
            deltaX = 0;
        }

        deltaX = Math.max(-100, Math.min(100, deltaX));
        
        const swipeProgress = Math.abs(deltaX) / SwipeHandler.threshold;
        SwipeHandler.targetGroup.style.transform = `translateX(${deltaX}px)`;
        if (SwipeHandler.replyIcon) {
            SwipeHandler.replyIcon.style.opacity = Math.min(1, swipeProgress);
            const iconOffset = SwipeHandler.isMine ? '10px' : '-40px';
            SwipeHandler.replyIcon.style.right = `calc(${iconOffset} + ${-deltaX}px)`;
        }
    },

    end: () => {
        if (!SwipeHandler.isSwiping) return;

        const deltaX = SwipeHandler.currentX - SwipeHandler.startX;

        let canReply = (SwipeHandler.isMine && deltaX < -SwipeHandler.threshold) || 
                       (!SwipeHandler.isMine && deltaX > SwipeHandler.threshold);

        if (canReply) {
            UI.showReplyPreview(SwipeHandler.targetMessage);
        }

        if (SwipeHandler.targetGroup) {
            SwipeHandler.targetGroup.style.transition = 'transform 0.2s ease-out';
            SwipeHandler.targetGroup.style.transform = 'translateX(0px)';
            if (SwipeHandler.replyIcon) SwipeHandler.replyIcon.style.opacity = 0;
            
            setTimeout(() => {
                if (SwipeHandler.targetGroup) SwipeHandler.targetGroup.style.transition = '';
            }, 200);
        }
        
        SwipeHandler.cancel();
    },

    cancel: () => {
        document.removeEventListener('mousemove', SwipeHandler.move);
        document.removeEventListener('touchmove', SwipeHandler.move);
        
        SwipeHandler.isSwiping = false;
        SwipeHandler.targetWrapper = null;
        SwipeHandler.targetGroup = null;
        SwipeHandler.targetMessage = null;
    }
};

const VoiceRecorder = {
    mediaRecorder: null, audioChunks: [], isRecording: false,
    stream: null, startTime: 0, timerInterval: null,
    init: () => {
        const recordBtn = document.getElementById('record-btn');
        if (!recordBtn) return;
        recordBtn.addEventListener('mousedown', VoiceRecorder.startRecording);
        document.addEventListener('mouseup', VoiceRecorder.stopRecording);
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); VoiceRecorder.startRecording(); }, { passive: false });
        document.addEventListener('touchend', VoiceRecorder.stopRecording);
    },
    startRecording: async () => {
        if (VoiceRecorder.isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            VoiceRecorder.stream = stream;
            VoiceRecorder.isRecording = true;
            document.getElementById('recording-indicator').classList.add('visible');
            VoiceRecorder.startTime = Date.now();
            VoiceRecorder.updateTimer();
            VoiceRecorder.timerInterval = setInterval(VoiceRecorder.updateTimer, 1000);

            VoiceRecorder.mediaRecorder = new MediaRecorder(stream);
            VoiceRecorder.audioChunks = [];
            VoiceRecorder.mediaRecorder.ondataavailable = event => VoiceRecorder.audioChunks.push(event.data);
            
            VoiceRecorder.mediaRecorder.onstop = async () => {
                if (VoiceRecorder.audioChunks.length > 0 && (Date.now() - VoiceRecorder.startTime > 1000)) {
                    const audioBlob = new Blob(VoiceRecorder.audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size === 0) {
                        console.error("Recording resulted in an empty (0 byte) blob. Not sending.");
                    } else {
                        await App.handleVoiceUpload(audioBlob);
                    }
                }
                VoiceRecorder.audioChunks = [];
                if (VoiceRecorder.stream) {
                    VoiceRecorder.stream.getTracks().forEach(track => track.stop());
                    VoiceRecorder.stream = null;
                }
            };
            VoiceRecorder.mediaRecorder.start();
        } catch (error) {
            console.error("Could not get microphone access or start recording:", error);
            UI.showConfirm('لا يمكن الوصول إلى الميكروفون. يرجى التحقق من الأذونات.', () => {});
            VoiceRecorder.reset();
        }
    },
    stopRecording: () => {
        if (!VoiceRecorder.isRecording) return;
        if (VoiceRecorder.mediaRecorder && VoiceRecorder.mediaRecorder.state === 'recording') {
            try {
                VoiceRecorder.mediaRecorder.stop();
            } catch (e) {
                console.error("Error stopping media recorder:", e);
            }
        }
        VoiceRecorder.reset();
    },
    updateTimer: () => {
        const elapsed = Math.floor((Date.now() - VoiceRecorder.startTime) / 1000);
        const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const seconds = String(elapsed % 60).padStart(2, '0');
        document.getElementById('recording-timer').textContent = `${minutes}:${seconds}`;
    },
    reset: () => {
        VoiceRecorder.isRecording = false;
        clearInterval(VoiceRecorder.timerInterval);
        document.getElementById('recording-indicator').classList.remove('visible');
        document.getElementById('recording-timer').textContent = '00:00';
    }
};

const NotificationManager = {
    init: async () => {
        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('/sw.js');
                if ('Notification' in window && Notification.permission === 'default') {
                    await Notification.requestPermission();
                }
            } catch (e) { console.error(e); }
        }
    },

    listen: () => {
        // الاستماع لأي رسالة جديدة تدخل قاعدة البيانات
        client.channel('global-notifications-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
                const msg = payload.new;
                
                // تجاهل رسائلي أنا
                if (!msg || msg.user_id === currentUser.id) return;
                
                // إذا كنت فاتح المحادثة الآن، لا ترسل إشعاراً
                if (document.body.classList.contains('room-active') && currentChatId === msg.chat_id && !document.hidden) {
                    return;
                }

                // 1. جلب بيانات المرسل (الاسم والصورة)
                const { data: chatData } = await client.from('chats').select('is_group, name, avatar_url').eq('id', msg.chat_id).single();
                let senderName = "رسالة جديدة";
                let avatarUrl = null;
                
                if (chatData && chatData.is_group) {
                    senderName = chatData.name;
                    avatarUrl = chatData.avatar_url;
                } else {
                    const { data: profile } = await client.from('profiles').select('first_name, username, avatar_url').eq('id', msg.user_id).single();
                    if (profile) {
                        senderName = profile.first_name || profile.username;
                        avatarUrl = profile.avatar_url;
                    }
                }

                // 2. (الخطوة الحاسمة) جلب عدد الرسائل الحقيقي من السيرفر
                // نستخدم نفس الدالة التي تلون العداد بالأحمر داخل التطبيق
                let realUnreadCount = 1;
                try {
                    const { data: updates } = await client.rpc('get_chat_list_updates', { p_user_id: currentUser.id });
                    if (updates) {
                        const currentChatUpdate = updates.find(c => c.chat_id === msg.chat_id);
                        if (currentChatUpdate) {
                            realUnreadCount = currentChatUpdate.unread_count;
                        }
                    }
                } catch (err) {
                    console.error("فشل جلب العدد من السيرفر", err);
                }

                // 3. تحديد محتوى الرسالة
                let content = msg.type === 'text' ? msg.content : (msg.type === 'image' ? '📷 صورة' : '📎 ملف');

                // 4. إطلاق الإشعار بالبيانات الحقيقية
                NotificationManager.triggerExternal(senderName, content, realUnreadCount, msg.chat_id, avatarUrl);
            })
            .subscribe();
    },

    triggerExternal: (title, body, count, chatId, avatarUrl) => {
        if (Notification.permission === 'granted') {
            // إذا كان العدد أكبر من 1، نعرضه بجانب الرسالة
            const finalText = count > 1 ? `(${count} رسائل جديدة) ${body}` : body;
            
            // تجهيز البيانات للـ Service Worker
            const options = {
                body: finalText,
                icon: avatarUrl || 'https://ui-avatars.com/api/?background=0d6efd&color=fff&name=' + encodeURIComponent(title),
                tag: `chat-${chatId}`, // هذا يضمن تجميع رسائل نفس الشخص في إشعار واحد
                renotify: true,        // يهتز الهاتف مع كل رسالة جديدة
                data: {
                    url: `/chat?id=${chatId}` // الرابط جاهز تماماً هنا
                }
            };

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, options);
                }).catch(err => {
                    // Fallback
                    new Notification(title, options);
                });
            } else {
                new Notification(title, options);
            }
        }
    }
};

        .select()

pollForChatUpdates: async () => {
    // لا تقم بالتحديث إذا كان المستخدم داخل محادثة
    if (!currentUser || document.body.classList.contains('room-active')) return;

    const { data: updates, error } = await client.rpc('get_chat_list_updates', { p_user_id: currentUser.id });

    if (error || !updates) return;

    updates.forEach(update => {
        const convItem = document.querySelector(`.conversation-item[data-chat-id="${update.chat_id}"]`);
        if (!convItem) return;

        // 1. تحديث آخر رسالة
        const lastMessageEl = convItem.querySelector('.conv-last-message');
        if (lastMessageEl) {
            let lastMsgContent = update.last_message_content || '...';
            if (update.last_message_type && update.last_message_type !== 'text') {
                switch(update.last_message_type) {
                    case 'image': lastMsgContent = '📷 صورة'; break;
                    case 'video': lastMsgContent = '📹 فيديو'; break;
                    case 'audio': lastMsgContent = '🎵 رسالة صوتية'; break;
                    default: lastMsgContent = '📄 ملف'; break;
                }
            }
            lastMessageEl.innerHTML = lastMsgContent + '\u200E';
        }

        // 2. تحديث عداد الرسائل غير المقروءة
        const badgeEl = convItem.querySelector('.unread-badge');
        if (badgeEl) {
            if (update.unread_count > 0) {
                badgeEl.textContent = update.unread_count;
                badgeEl.classList.remove('hidden');
            } else {
                badgeEl.classList.add('hidden');
            }
        }
    });
},


// دالة لإعادة رسم كل الرسائل الظاهرة حاليًا
redrawAllVisibleMessages: () => {
    if (!currentChatObject) return;
    const container = document.getElementById('messages-container');

    const scrollPosition = container.scrollHeight - container.scrollTop;

    const displayedIds = Array.from(App.displayedMessages.keys());
    const visibleMessages = currentChatState.messages.filter(m => displayedIds.includes(m.id || `temp-${m.temp_id}`));

    container.innerHTML = `<div id="pagination-loader"></div><div id="dynamic-typing-indicator" class="message-wrapper hidden"></div>`;
    App.displayedMessages.clear();

    const fragment = document.createDocumentFragment();
    
    visibleMessages.forEach((msg, index) => {
        const previousMessage = visibleMessages[index - 1] || null;
        const nextMessage = visibleMessages[index + 1] || null;
        
        if (index > 0) {
            const currentMsgDate = new Date(msg.created_at);
            const prevMsgDate = new Date(previousMessage.created_at);
            if (!isSameDay(currentMsgDate, prevMsgDate)) {
                const separator = UI.createDateSeparatorElement(UI.formatDateSeparator(msg.created_at));
                fragment.appendChild(separator);
            }
        } else if (visibleMessages.length > 0) {
            const separator = UI.createDateSeparatorElement(UI.formatDateSeparator(msg.created_at));
            fragment.appendChild(separator);
        }

        const messageElement = UI.createMessageElement(msg, previousMessage, nextMessage);
        fragment.appendChild(messageElement);
        App.displayedMessages.set(msg.id || `temp-${msg.temp_id}`, messageElement);
    });
    
    container.appendChild(fragment);

    container.scrollTop = container.scrollHeight - scrollPosition;
    App.updateLastMessageSeenDisplay();
},

// دالة لتحديث رسالة واحدة فقط (لقد قمت بتحسينها قليلاً)
updateSingleMessageInUI: (updatedMessage) => {
    const wrapperElement = App.displayedMessages.get(updatedMessage.id);
    if (!wrapperElement) return;

    // لا تقم بتحديث الرسالة الصوتية نفسها لتجنب إيقاف التشغيل
    if (updatedMessage.type === 'audio') {
        const indicator = wrapperElement.querySelector('.permanent-indicator');
        if(indicator) {
            indicator.textContent = updatedMessage.is_starred ? '⭐ مميزة' : (updatedMessage.is_edited ? 'تم التعديل' : '');
        }
        return;
    }

    // تحديث النص إذا كان مختلفًا
    const contentElement = wrapperElement.querySelector('.message-content');
    if (contentElement && contentElement.innerHTML !== linkify(updatedMessage.content)) {
        contentElement.innerHTML = linkify(updatedMessage.content);
    }
    
    // تحديث مؤشر "تم التعديل"
    const metaElement = wrapperElement.querySelector('.message-meta');
    if (metaElement) {
        let editedIndicator = metaElement.querySelector('.edited-indicator');
        if (updatedMessage.is_edited && !editedIndicator) {
            editedIndicator = document.createElement('span');
            editedIndicator.className = 'edited-indicator';
            editedIndicator.textContent = '(تم التعديل)';
            metaElement.insertBefore(editedIndicator, metaElement.querySelector('.message-status-icon'));
        } else if (!updatedMessage.is_edited && editedIndicator) {
            editedIndicator.remove();
        }
    }
    
    // تحديث مؤشر "مميزة"
     const indicator = wrapperElement.querySelector('.permanent-indicator');
     if(indicator) {
        indicator.textContent = updatedMessage.is_starred ? '⭐ مميزة' : '';
     }
},


editMessage: async (message) => {
    UI.showPrompt("تعديل الرسالة", message.content, async (newContent) => {
        const trimmedContent = newContent.trim();
        if (trimmedContent === '' || trimmedContent === message.content) {
            return;
        }

        const { data: updatedMessage, error } = await client.from('messages')
            .update({ content: trimmedContent, is_edited: true })
            .eq('id', message.id)
            .select('*, replied_message:replying_to_message_id(*, sender:profiles!messages_user_id_fkey(*))')
            .single();

        if (error) {
            UI.showToast("فشل تعديل الرسالة.");
        } else if (updatedMessage) {
            App.updateSingleMessageInUI(updatedMessage);
            if (chatUpdatesChannel) {
                chatUpdatesChannel.send({
                    type: "broadcast",
                    event: "message-updated",
                    payload: { updatedMessage: updatedMessage }
                });
            }
        }
    });
},

cleanupOffscreenMessages: (direction) => {
    const container = document.getElementById('messages-container');
    if (!container) return;

    const currentMessageCount = container.children.length;
    if (currentMessageCount <= App.maxMessagesInDom) {
        return; // لا داعي للتنظيف
    }

    const countToRemove = currentMessageCount - App.maxMessagesInDom;

    if (direction === 'bottom') {
        // نحن نسحب للأعلى، لذا الرسائل الجديدة (في الأسفل) هي البعيدة
        // بسبب column-reverse، الرسائل الجديدة هي أول العناصر في DOM
        for (let i = 0; i < countToRemove; i++) {
            const childToRemove = container.children[0];
            if (childToRemove && childToRemove.dataset.messageId) {
                App.displayedMessages.delete(childToRemove.dataset.messageId);
                // ملاحظة: لا نحذف من currentChatState.messages لأننا قد نحتاجها
            }
            if (childToRemove) childToRemove.remove();
        }
    } else if (direction === 'top') {
        // تأتي رسالة جديدة، لذا الرسائل القديمة (في الأعلى) هي البعيدة
        // بسبب column-reverse، الرسائل القديمة هي آخر العناصر في DOM
        for (let i = 0; i < countToRemove; i++) {
            const childToRemove = container.lastElementChild;
            if (childToRemove && childToRemove.dataset.messageId) {
                App.displayedMessages.delete(childToRemove.dataset.messageId);
            }
            if (childToRemove) childToRemove.remove();
        }
    }
},
    
    
forceRefreshChat: async () => {
    // الكاشف الذي يمنع التداخل (مهم جدًا)
    if (chatPagination.isLoading) return; 
    
    if (!currentChatId || !currentUser || document.hidden) return;

    // --- الجزء الأول: الكود القديم المستقر لتحديث الرسائل ---
    const displayedIds = Array.from(App.displayedMessages.keys()).filter(id => id && !String(id).startsWith('temp-'));
    if (displayedIds.length > 0) {
        const { data: remoteMessages, error } = await client
            .from('messages')
            .select('*, replied_message:replying_to_message_id(*)')
            .in('id', displayedIds);

        if (!error) {
            remoteMessages.forEach(remoteMsg => {
                const localMsgIndex = currentChatState.messages.findIndex(m => m.id === remoteMsg.id);
                if (localMsgIndex !== -1) {
                    const localMsg = currentChatState.messages[localMsgIndex];
                    if (new Date(remoteMsg.updated_at).getTime() > new Date(localMsg.updated_at).getTime()) {
                        currentChatState.messages[localMsgIndex] = remoteMsg;
                        App.updateSingleMessageInUI(remoteMsg);
                    }
                }
            });
        }
    }
    
    // --- الجزء الثاني: الكاشف الجديد لإضافة التاريخ الأول ---
    if (chatPagination.allLoaded) {
        const container = document.getElementById('messages-container');
        const firstElement = container.querySelector('.message-wrapper, .system-message-wrapper');

        // إذا كان العنصر الأول ليس فاصل تاريخ، قم بإضافته
        if (firstElement && !firstElement.classList.contains('system-message-wrapper')) {
            const firstMessage = currentChatState.messages[0];
            if (firstMessage) {
                const separator = UI.createDateSeparatorElement(UI.formatDateSeparator(firstMessage.created_at));
                container.prepend(separator);
            }
        }
    }
},

refreshMessageSequenceUI: () => {
    if (!currentChatId || currentChatState.messages.length === 0) return;

    const container = document.getElementById('messages-container');
    const scrollPosition = container.scrollHeight - container.scrollTop;

    currentChatState.messages.forEach((msg, index) => {
        const messageId = msg.id || `temp-${msg.temp-id}`;
        const currentElement = App.displayedMessages.get(messageId);

        if (currentElement) {
            const previousMessage = currentChatState.messages[index + 1] || null;
            const nextMessage = currentChatState.messages[index - 1] || null;
            const newElement = UI.createMessageElement(msg, previousMessage, nextMessage);

            currentElement.replaceWith(newElement);
            App.displayedMessages.set(messageId, newElement);
        }
    });

    container.scrollTop = container.scrollHeight - scrollPosition;
},
