handleChatScroll: () => {
    const container = document.getElementById('messages-container');
    const preview = document.getElementById('new-message-preview');
    
    const isFarFromBottom = container.scrollHeight - container.scrollTop - container.clientHeight > container.clientHeight;
    const hasNewMessages = newMessagesWhileScrolled > 0;

    if (isFarFromBottom && !hasNewMessages) {
        preview.classList.add('arrow-only');
        preview.classList.add('visible');
    } else if (!hasNewMessages) {
        preview.classList.remove('visible');
        preview.classList.remove('arrow-only');
    }
    
    const isAtVeryBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    if (isAtVeryBottom) {
         preview.classList.remove('visible');
         preview.classList.remove('arrow-only');
         newMessagesWhileScrolled = 0;
    }
},

    openChatRoom: async (chatId, chatObject, fromHistory = false) => {
    	if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(registration => {
            // البحث عن الإشعارات التي تحمل تاج هذه المحادثة وإغلاقها
            registration.getNotifications({ tag: `chat-${chatId}` }).then(notifications => {
                notifications.forEach(notification => notification.close());
            });
        });
    }
    isRoomLoading = true;
    App.startLastSeenPolling();
    App.stopChatListPolling();
    App.startForceSeenCheck();
    newMessagesWhileScrolled = 0;
    

    if (chatUpdatesChannel) {
        client.removeChannel(chatUpdatesChannel);
        chatUpdatesChannel = null;
    }
    if (currentChatId === chatId && document.body.classList.contains('room-active')) {
        isRoomLoading = false;
        return;
    }

    document.getElementById('messages-container').onscroll = App.handleChatScroll;
    const messageInput = document.getElementById('message-input');
    if (currentChatId && messageInput.value.trim() !== '') {
        chatDrafts[currentChatId] = messageInput.value;
    }

    if (!fromHistory) {
        history.pushState({ view: 'chat', chatId: chatId }, "", `?id=${chatId}`);
    }
    
    document.body.classList.add('room-active');

    document.getElementById('reply-preview-container').classList.add('hidden');
    messageInput.value = '';
    messageInput.style.height = 'auto';

    currentChatId = chatId;
    currentChatState = { nicknames: {}, isBlocked: false, iAmBlocked: false, messages: [] };
    App.displayedMessages.clear();
    UI.showChatRoomSkeleton();

    const { data, error } = await client.from('chats').select('*, participants:chat_participants(*, profile:profiles(*))').eq('id', chatId).single();
    if (error) { 
        App.showListView(); 
        isRoomLoading = false;
        return; 
    }
    currentChatObject = data;
    currentChatObject.participants = data.participants.map(p => p.profile).filter(Boolean);

    if (currentChatObject.is_group) {
        chatPartner = null;
    } else {
        chatPartner = currentChatObject.participants.find(p => p.id !== currentUser.id);
        if (!chatPartner) { 
            console.error("Could not find chat partner."); 
            App.showListView(); 
            isRoomLoading = false;
            return; 
        }
        await App.fetchAndUpdateBlockStatus();
        await App.fetchFriendshipStatus();
    }

    const { data: nicknamesRes } = await client.from('chat_nicknames').select('*').eq('chat_id', chatId);
    currentChatState.nicknames = Object.fromEntries((nicknamesRes || []).map(n => [n.user_id, n.nickname]));
    
    UI.renderChatRoomHeader(currentChatObject.is_group ? currentChatObject : chatPartner);
    ChatSettings.loadTheme(chatId);
    App.updateChatHeaderSubtext();
    await App.loadInitialMessages();

    messageInput.value = chatDrafts[chatId] || '';
    messageInput.dispatchEvent(new Event('input'));

    if (chatReplies[currentChatId]) {
        UI.showReplyPreview(chatReplies[currentChatId]);
    }

    App.listenToChatUpdates(chatId);
    App.startForceRefresh();
    if (currentChatObject.is_group) {
        App.updateGroupSeenMarkers(); 
        forceSeenCheckInterval = setInterval(App.updateLastSeenMarkers, 3000); 
    }
    isRoomLoading = false;
},

// استبدل الدالة بالكامل
loadConversations: async () => {
    if (document.body.classList.contains('selection-mode')) return;

    const { data: usersWhoBlockedMe, error: blockError } = await client
        .from('blocked_users').select('blocker_id').eq('blocked_id', currentUser.id);
    if (blockError) { console.error("Error fetching blockers:", blockError); return; }
    const usersWhoBlockedMeIds = new Set((usersWhoBlockedMe || []).map(b => b.blocker_id));

    const { data: chatDetails, error: detailsError } = await client
        .rpc('get_chats_details_for_user', { p_user_id: currentUser.id });
        
    if(detailsError) { 
        console.error("Fatal error fetching chat details:", detailsError);
        return;
    }

    if (!chatDetails || chatDetails.length === 0) {
        UI.renderConversationList([]);
        return;
    }
    
    const allChats = chatDetails.filter(c => {
        return c.is_archived === showingArchived;
    }).map(c => ({
        ...c,
        participants: c.participants ? c.participants.filter(p => p.profile) : []
    })).filter(c => {
        if (localState.hiddenChats.includes(c.chat_id)) return false;
        if (c.is_group) return true;
        const otherUser = c.participants.find(p => p.profile && p.profile.id !== currentUser.id)?.profile;
        return otherUser && !usersWhoBlockedMeIds.has(otherUser.id);
    });

    const formattedChats = allChats.map(c => {
        let lastMsgContent = c.last_message_content || '...';
        if (c.last_message_type && c.last_message_type !== 'text') {
            switch(c.last_message_type) {
                case 'image': lastMsgContent = '📷 صورة'; break;
                case 'video': lastMsgContent = '📹 فيديو'; break;
                case 'audio': lastMsgContent = '🎵 رسالة صوتية'; break;
                default: lastMsgContent = '📄 ملف'; break;
            }
        }
        let chatObject = {
            id: c.chat_id, is_group: c.is_group, created_by: c.created_by,
            last_message_content: lastMsgContent, last_message_at: c.last_message_at,
            is_pinned: c.is_pinned, pinned_at: c.pinned_at,
            is_archived: c.is_archived, archived_at: c.archived_at
        };
        if (c.is_group) {
            chatObject.name = c.name;
            chatObject.avatar_url = c.avatar_url;
            chatObject.participants = c.participants.map(p => p.profile);
        } else {
            const otherParticipant = c.participants.find(p => p.profile && p.profile.id !== currentUser.id);
            if (!otherParticipant || !otherParticipant.profile) return null;
            chatObject.otherUser = otherParticipant.profile;
            chatObject.nickname = otherParticipant.nickname;
        }
        return chatObject;
    });

    UI.renderConversationList(formattedChats.filter(Boolean).sort((a, b) => {
        if (a.is_pinned && !b.is_pinned) return -1;
        if (!a.is_pinned && b.is_pinned) return 1;
        if (a.is_pinned && b.is_pinned) {
            return new Date(b.pinned_at) - new Date(a.pinned_at);
        }
        const sortDateA = showingArchived ? a.archived_at : a.last_message_at;
        const sortDateB = showingArchived ? b.archived_at : b.last_message_at;
        return new Date(sortDateB || 0) - new Date(sortDateA || 0);
    }));
},

        .select('*')
        .or(`and(blocker_id.eq.${currentUser.id},blocked_id.eq.${chatPartner.id}),and(blocker_id.eq.${chatPartner.id},blocked_id.eq.${currentUser.id})`);

    const newIsBlocked = (blockData || []).some(b => b.blocker_id === currentUser.id);
    const newIAmBlocked = (blockData || []).some(b => b.blocked_id === currentUser.id);

    if (newIsBlocked !== currentChatState.isBlocked || newIAmBlocked !== currentChatState.iAmBlocked) {

        chatUpdatesChannel = null;

    chatUpdatesChannel = client.channel(`realtime-chat-${chatId}`)
        .on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, 
            (payload) => App.handleIncomingMessage(payload.new)
        )
        .on('broadcast', { event: 'messages-seen' }, ({ payload }) => {

        .on('broadcast', { event: 'nickname-changed' }, ({ payload }) => {

            App.handleNicknameChange(payload);
        })
        .on('broadcast', { event: 'message-deleted' }, ({ payload }) => {
            App.handleDeletedMessage(payload);
        })
        .on('broadcast', { event: 'message-updated' }, ({ payload }) => {
            App.updateSingleMessageInUI(payload.updatedMessage);

handleIncomingMessage: async (newMessage) => {
    if (!newMessage || App.displayedMessages.has(newMessage.id)) return;

    if (newMessage.replying_to_message_id && !newMessage.replied_message) {
        const { data: repliedMsg } = await client.from('messages').select(`*`).eq('id', newMessage.replying_to_message_id).single();
        newMessage.replied_message = repliedMsg;
    }

    const container = document.getElementById('messages-container');
    const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 150;

    const lastMessageInState = currentChatState.messages.length > 0 ? currentChatState.messages[currentChatState.messages.length - 1] : null;

    if (lastMessageInState) {
        const lastMessageElement = App.displayedMessages.get(lastMessageInState.id);
        if (lastMessageElement) {
            const messageBeforeLast = currentChatState.messages.length > 1 ? currentChatState.messages[currentChatState.messages.length - 2] : null;
            const updatedLastElement = UI.createMessageElement(lastMessageInState, messageBeforeLast, newMessage);
            lastMessageElement.replaceWith(updatedLastElement);
            App.displayedMessages.set(lastMessageInState.id, updatedLastElement);
        }
    }
    
    if (!lastMessageInState || !isSameDay(new Date(lastMessageInState.created_at), new Date(newMessage.created_at))) {
        const separator = UI.createDateSeparatorElement(UI.formatDateSeparator(newMessage.created_at));
        container.appendChild(separator);
    }
    
    const newElement = UI.createMessageElement(newMessage, lastMessageInState, null);
    newElement.classList.add('new-message');
    container.appendChild(newElement);
    App.displayedMessages.set(newMessage.id, newElement);

    currentChatState.messages.push(newMessage);
    App.cleanupOldestMessages();

    if (newMessage.user_id === currentUser.id) {
        UI.scrollToBottom('smooth');
    } else {
        if (isAtBottom) {
            UI.scrollToBottom('smooth');
            newMessagesWhileScrolled = 0;
        } else {
            newMessagesWhileScrolled++;
            const preview = document.getElementById('new-message-preview');
            const countBadge = document.getElementById('new-message-count');
            const sender = currentChatObject.participants.find(p => p.id === newMessage.user_id);

            if (sender) {
                preview.classList.remove('arrow-only');
                const senderName = currentChatState.nicknames[sender.id] || sender.first_name || sender.username;
                document.getElementById('preview-avatar').innerHTML = UI.createAvatar(sender, 32);
                document.getElementById('preview-sender').textContent = senderName;
                let previewContent = newMessage.content || '';
                if (newMessage.type === 'image') previewContent = '📷 صورة';
                else if (newMessage.type === 'video') previewContent = '📹 فيديو';
                else if (newMessage.type === 'audio') previewContent = '🎵 رسالة صوتية';
                document.getElementById('preview-text').textContent = previewContent + '\u200E';
                if (newMessagesWhileScrolled > 1) {
                    countBadge.textContent = newMessagesWhileScrolled;
                    countBadge.classList.remove('hidden');
                } else {
                    countBadge.classList.add('hidden');
                }
                preview.classList.add('visible');
            }
        }
    }

    if (newMessage.user_id !== currentUser.id && !document.hidden) {
        await App.markVisibleMessagesAsSeen();
    }
    
    App.autoShowLastMessageSeenList();
    App.updateLastMessageSeenDisplay();
},

    updateChatHeaderSubtext: (typingInfo = null) => {
    const subtextElement = document.getElementById('typing-indicator');
    if (!subtextElement) return;

    const isBlockedNow = (chatPartner && (currentChatState.isBlocked || currentChatState.iAmBlocked));

    // الجزء الجديد والمطور للتعامل مع قائمة الكاتبين
    if (typingInfo && typingInfo.isTyping && typingInfo.users && typingInfo.users.length > 0 && !isBlockedNow) {
        let users = typingInfo.users;
        
        // اقتصار القائمة على 5 أشخاص كحد أقصى كما طلبت
        if (users.length > 5) {
            users = users.slice(0, 5);
        }
        
        const names = users.map(user => App.getUserDisplayName(user.id));
        let typingText = "";

        if (names.length === 1) {
            typingText = `${names[0]} يكتب الآن...`;
        } else if (names.length === 2) {
            typingText = `${names[0]} و ${names[1]} يكتبان الآن...`;
        } else { // 3 إلى 5 أشخاص
            const last = names.pop();
            typingText = `${names.join('، ')}، و ${last} يكتبون الآن...`;
        }
        
        subtextElement.textContent = typingText;
        return;
    }
    
    // الكود القديم يعمل كخطة بديلة في حال لم يكن أحد يكتب
    if (chatPartner) {
        if (onlineUsers.has(chatPartner.id) && !isBlockedNow) {
            subtextElement.textContent = 'متصل الآن';
        } else {
            subtextElement.textContent = '';
        }
        return;
    }
    
    if (currentChatObject && currentChatObject.is_group) {
        const onlineMembersCount = currentChatObject.participants.filter(p => 
            p && p.id !== currentUser.id && onlineUsers.has(p.id)
        ).length;
        const totalMembersCount = currentChatObject.participants.length;

        if (onlineMembersCount > 0) {
            subtextElement.textContent = `${onlineMembersCount} متصلون الآن`;
        } else {
            subtextElement.textContent = `${totalMembersCount} أعضاء`;
        }
        return;
    }
    
    subtextElement.textContent = '';
},

updateGroupSeenMarkers: async () => {
    if (!currentChatObject || !currentChatObject.is_group || document.hidden) return;

    const messageElements = Array.from(document.querySelectorAll('.message-wrapper[data-message-id]'));
    const messageIds = messageElements.map(el => el.dataset.messageId).filter(id => id && !id.startsWith('temp-'));
    if (messageIds.length === 0) return;

    const { data: receipts, error } = await client.from('message_receipts')
        .select('message_id, user_id')
        .in('message_id', messageIds);

    logError(error, "updateGroupSeenMarkers");
    if (error) return;
    if (!receipts) return;

    const receiptsByMessage = receipts.reduce((acc, receipt) => {
        if (!acc[receipt.message_id]) acc[receipt.message_id] = new Set();
        acc[receipt.message_id].add(receipt.user_id);
        return acc;
    }, {});

    messageElements.forEach(msgWrapper => {
        const msgId = msgWrapper.dataset.messageId;
        const msg = currentChatState.messages.find(m => m.id == msgId);
        const seenContainer = msgWrapper.querySelector(`.seen-by-container[data-message-id="${msgId}"]`);
        
        if (!msg || !seenContainer) return;

        const readersSet = receiptsByMessage[msgId] || new Set();
        const viewers = Array.from(readersSet)
            .filter(userId => userId !== msg.user_id) // استثناء المرسل
            .map(userId => currentChatObject.participants.find(p => p && p.id === userId))
            .filter(Boolean);

        if (viewers.length === 0) {
            seenContainer.innerHTML = '';
            return;
        }
        
        let html = '';
        viewers.forEach(viewer => {
            html += `<div class="seen-by-avatar" title="شوهد بواسطة ${viewer.first_name || viewer.username}">${UI.createAvatar(viewer, 16)}</div>`;
        });
        seenContainer.innerHTML = html;
    });
},
// داخل كائن App
updateLastSeenMarkers: async () => {
    if (!currentChatObject || !currentChatObject.is_group || document.hidden) return;

    // 1. احصل على IDs كل المشاركين في المجموعة (باستثنائي)
    const memberIds = currentChatObject.participants
        .map(p => p.id)
        .filter(id => id !== currentUser.id);

    if (memberIds.length === 0) return;

    // 2. احصل على كل إيصالات هؤلاء الأعضاء
    const { data: receipts, error } = await client.from('message_receipts')
        .select('user_id, message_id, read_at')
        .in('user_id', memberIds); // <-- الفلترة الصحيحة هنا

    logError(error, "updateLastSeenMarkers");
    if (error) return;
    if (!receipts || receipts.length === 0) return;
    
    // 3. فلترة الإيصالات لتشمل فقط رسائل هذه المحادثة
    const messageIdsInChat = new Set(currentChatState.messages.map(m => m.id));
    const relevantReceipts = receipts.filter(r => messageIdsInChat.has(r.message_id));

    // 4. ابحث عن آخر رسالة شاهدها كل مستخدم
    const lastSeenBy = new Map();
    for (const receipt of relevantReceipts) {
        const existing = lastSeenBy.get(receipt.user_id);
        if (!existing || new Date(receipt.read_at) > new Date(existing.timestamp)) {
            lastSeenBy.set(receipt.user_id, { 
                messageId: receipt.message_id, 
                timestamp: receipt.read_at 
            });
        }
    }

    // 5. قم بإزالة المؤشرات القديمة
    document.querySelectorAll('.seen-by-container').forEach(c => c.innerHTML = '');

    // 6. ضع المؤشرات الجديدة
    lastSeenBy.forEach((seenInfo, userId) => {
        const viewerProfile = currentChatObject.participants.find(p => p.id === userId);
        if (!viewerProfile) return;
        const targetContainer = document.querySelector(`.seen-by-container[data-message-id="${seenInfo.messageId}"]`);
        if (targetContainer) {
            const avatarHTML = `<div class="seen-by-avatar" title="شوهد بواسطة ${viewerProfile.first_name || viewerProfile.username}">${UI.createAvatar(viewerProfile, 16)}</div>`;
            targetContainer.innerHTML += avatarHTML;
        }
    });
},
    
    updateSingleMessageInUI: (updatedMessage) => {
    // الطريقة الجديدة والمباشرة: ابحث في الشاشة عن العنصر القديم
    const oldElement = document.querySelector(`.message-wrapper[data-message-id="${updatedMessage.id}"]`);
    
    // إذا وجدنا العنصر القديم على الشاشة، نستبدله
    if (oldElement) {
        // ابحث عن موقع الرسالة في مصفوفة البيانات لتحديثها
        const msgIndex = currentChatState.messages.findIndex(m => m.id === updatedMessage.id);
        if (msgIndex !== -1) {
            currentChatState.messages[msgIndex] = updatedMessage;
        }

        // احصل على الرسائل المجاورة لإعادة البناء بشكل صحيح
        const previousMessage = currentChatState.messages[msgIndex + 1] || null;
        const nextMessage = currentChatState.messages[msgIndex - 1] || null;
        
        // قم ببناء عنصر جديد بالكامل بالبيانات المحدثة
        const newElement = UI.createMessageElement(updatedMessage, nextMessage, previousMessage);
        
        // استبدل القديم بالجديد
        oldElement.replaceWith(newElement);
        
        // حدّث الخريطة المرجعية لتشير إلى العنصر الجديد
        App.displayedMessages.set(updatedMessage.id, newElement);
    }
},
 
    listenToBlockEvents: () => {
        if (blockChannel) client.removeChannel(blockChannel);
        const handleGlobalUpdate = (payload) => {
            if (currentChatId && chatPartner) {
                const change = payload.new || payload.old;
                if (!change) return;
                const userIds = [change.user1_id, change.user2_id, change.blocker_id, change.blocked_id].filter(Boolean);
                if (userIds.includes(currentUser.id) && userIds.includes(chatPartner.id)) {
                    App.fetchAndUpdateBlockStatus();
                    App.fetchFriendshipStatus();
                }
            }
        };
        blockChannel = client.channel('global-user-status-updates')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'blocked_users' }, handleGlobalUpdate)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'friendships' }, handleGlobalUpdate)
            .subscribe();
    },

    listenToPresence: () => {
        presenceChannel = client.channel('online-users');
        const updateOnlineUsers = () => {
            const presenceState = presenceChannel.presenceState();
            onlineUsers.clear();
            for (const id in presenceState) {
                presenceState[id].forEach(presence => onlineUsers.add(presence.user_id));
            }
            UI.updatePresenceIndicators();
        };
        presenceChannel
            .on('presence', { event: 'sync' }, updateOnlineUsers)
            .on('presence', { event: 'join' }, ({ key, newPresences }) => {
                updateOnlineUsers();
            })
            .on('presence', { event: 'leave' }, ({ key, leftPresences }) => {
                updateOnlineUsers();
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await presenceChannel.track({ user_id: currentUser.id, online_at: new Date().toISOString() });
                }
            });
    },
    
    fetchFriendshipStatus: async () => {
        if (!chatPartner) {
            document.getElementById('friendship-status-container').innerHTML = '';
            return;
        }
        const { data } = await client.from('friendships').select('*').or(`and(user1_id.eq.${currentUser.id},user2_id.eq.${chatPartner.id}),and(user1_id.eq.${chatPartner.id},user2_id.eq.${currentUser.id})`).single();
        let buttonHTML = '';
        if (!data) {
            buttonHTML = `<button class="modal-list-button" onclick="ChatSettings.sendFriendRequest()"><span>إضافة صديق</span></button>`;
        } else if (data.status === 'accepted') {
            buttonHTML = `<button class="modal-list-button danger" onclick="ChatSettings.cancelFriendship()"><span>إلغاء الصداقة</span></button>`;
        } else if (data.status === 'pending') {
            if (data.action_user_id === currentUser.id) {
                buttonHTML = `<button class="modal-list-button danger" onclick="ChatSettings.cancelFriendship()"><span>إلغاء طلب الصداقة</span></button>`;
            } else {
                buttonHTML = `<button class="modal-list-button" style="color:var(--success-color);" onclick="ChatSettings.acceptFriendRequest()"><span>قبول طلب الصداقة</span></button>`;
            }
        }
        document.getElementById('friendship-status-container').innerHTML = buttonHTML;
    },

cleanupOldestMessages: () => {
    const container = document.getElementById('messages-container');
    if (!container) return;

    // 1. تنظيف الشاشة (DOM)
    const messageWrappers = container.querySelectorAll('.message-wrapper[data-message-id]');
    if (messageWrappers.length > App.maxMessagesInDom) {
        const countToRemove = messageWrappers.length - App.maxMessagesInDom;
        // نحن دائمًا نحذف أقدم الرسائل، والتي تكون في نهاية بنية DOM بسبب column-reverse
        for (let i = 0; i < countToRemove; i++) {
            const wrapperToRemove = container.lastElementChild;
            if (wrapperToRemove && wrapperToRemove.dataset.messageId) {
                App.displayedMessages.delete(wrapperToRemove.dataset.messageId);
            }
            if(wrapperToRemove) wrapperToRemove.remove();
        }
    }

    // 2. تنظيف الذاكرة (Array)
    if (currentChatState.messages.length > App.maxMessagesInMemory) {
        const countToRemove = currentChatState.messages.length - App.maxMessagesInMemory;
        // نحذف أقدم الرسائل من نهاية مصفوفة البيانات
        currentChatState.messages.splice(-countToRemove, countToRemove);
    }
},



/*
 * @AI-INSTRUCTION: CRITICAL FUNCTION. DO NOT MODIFY, REVERSE, OR REFACTOR THIS LOGIC.
 * This is the single source of truth for rendering messages to the DOM.
 * It correctly handles prepending (for old messages) and appending (for new messages)
 * while maintaining chronological order and date separators.
 * All message fetching functions MUST call this function to update the UI.
*/
renderMessageBatch: (messages, method = 'append') => {
    if (!messages || messages.length === 0) return;

    const container = document.getElementById('messages-container');
    const fragment = document.createDocumentFragment();
    const oldScrollHeight = container.scrollHeight;

    let referenceMessage = null; // الرسالة المرجعية
    if (method === 'prepend') {
        const firstMessageEl = container.querySelector('.message-wrapper[data-message-id]');
        referenceMessage = currentChatState.messages.find(m => m.id == firstMessageEl?.dataset.messageId);
    } else { // append
        const allMessagesInDom = [...container.querySelectorAll('.message-wrapper[data-message-id]')];
        const lastMessageEl = allMessagesInDom.pop();
        referenceMessage = currentChatState.messages.find(m => m.id == lastMessageEl?.dataset.messageId);
    }

    // إضافة فاصل التاريخ الأول إذا لزم الأمر
    if (method === 'prepend' && messages.length > 0) {
        if (referenceMessage && !isSameDay(new Date(messages[messages.length-1].created_at), new Date(referenceMessage.created_at))) {
             fragment.appendChild(UI.createDateSeparatorElement(UI.formatDateSeparator(referenceMessage.created_at)));
        }
    }

    messages.forEach((msg, index) => {
        const currentMsgDate = new Date(msg.created_at);
        const prevInBatch = messages[index - 1];

        // إضافة فاصل التاريخ الأول (للتحميل الأولي)
        if (index === 0 && method === 'append' && !referenceMessage) {
            fragment.appendChild(UI.createDateSeparatorElement(UI.formatDateSeparator(currentMsgDate)));
        } 
        // إضافة الفواصل بين الأيام داخل نفس الدفعة
        else if (prevInBatch && !isSameDay(currentMsgDate, new Date(prevInBatch.created_at))) {
            fragment.appendChild(UI.createDateSeparatorElement(UI.formatDateSeparator(currentMsgDate)));
        }

        let finalPrev, finalNext;
        if (method === 'prepend') {
            finalPrev = messages[index + 1] || null;
            finalNext = (index === 0) ? referenceMessage : messages[index - 1];
        } else { // append
            finalPrev = (index === 0) ? referenceMessage : messages[index - 1];
            finalNext = messages[index + 1] || null;
        }
        
        const messageElement = UI.createMessageElement(msg, finalPrev, finalNext);
        fragment.appendChild(messageElement);
        App.displayedMessages.set(msg.id || `temp-${msg.temp_id}`, messageElement);
    });

    if (method === 'prepend') {
        container.prepend(fragment);
        container.scrollTop = container.scrollHeight - oldScrollHeight;

        // تحديث الرسالة المرجعية (التي كانت الأولى) لتفقد اسم المرسل/الصورة
        if (referenceMessage) {
            const refElement = App.displayedMessages.get(referenceMessage.id);
            const newPrev = messages[messages.length - 1];
            const refNextIndex = currentChatState.messages.indexOf(referenceMessage) + 1;
            const refNext = currentChatState.messages[refNextIndex] || null;
            if (refElement && newPrev) {
                const updatedRefElement = UI.createMessageElement(referenceMessage, newPrev, refNext);
                refElement.replaceWith(updatedRefElement);
                App.displayedMessages.set(referenceMessage.id, updatedRefElement);
            }
        }
    } else { // append
        container.appendChild(fragment);
    }

    if (method === 'append' && referenceMessage) {
        const prevMsgElement = App.displayedMessages.get(referenceMessage.id);
        const messageBeforePrev = currentChatState.messages[currentChatState.messages.indexOf(referenceMessage) - 1];
        if (prevMsgElement) {
             const updatedPrevElement = UI.createMessageElement(referenceMessage, messageBeforePrev, messages[0]);
             prevMsgElement.replaceWith(updatedPrevElement);
             App.displayedMessages.set(referenceMessage.id, updatedPrevElement);
        }
    }
},




// داخل كائن App
loadInitialMessages: async () => {
    const container = document.getElementById('messages-container');
    chatPagination = { page: 0, pageSize: 20, isLoading: false, allLoaded: false };

    const { data, error } = await client.from('messages')
        .select(`*, replied_message:replying_to_message_id(*), message_receipts(user_id)`)
        .eq('chat_id', currentChatId)
        .order('created_at', { ascending: false })
        .range(0, 19);

    if (error) { return; }
    
    const processedData = data ? data.map(msg => {
        if (chatPartner && msg.user_id === currentUser.id && msg.message_receipts) {
            const hasBeenSeenByPartner = msg.message_receipts.some(receipt => receipt.user_id === chatPartner.id);
            if (hasBeenSeenByPartner) {
                return { ...msg, status: 'seen' };
            }
        }
        return msg;
    }) : [];

    const initialMessages = processedData.slice().reverse();
    currentChatState.messages = initialMessages;

    container.innerHTML = `<div id="pagination-loader"></div><div id="dynamic-typing-indicator" class="message-wrapper hidden"></div>`;
    App.displayedMessages.clear();

    const fragment = document.createDocumentFragment();
    let lastProcessedDate = null;
    
    currentChatState.messages.forEach((msg, index) => {
        const currentMsgDate = new Date(msg.created_at);
        if (lastProcessedDate === null || !isSameDay(currentMsgDate, lastProcessedDate)) {
            const separator = UI.createDateSeparatorElement(UI.formatDateSeparator(msg.created_at));
            fragment.appendChild(separator);
        }
        const previousMessage = currentChatState.messages[index - 1] || null;
        const nextMessage = currentChatState.messages[index + 1] || null;
        const messageElement = UI.createMessageElement(msg, previousMessage, nextMessage);
        fragment.appendChild(messageElement);
        App.displayedMessages.set(msg.id, messageElement);
        lastProcessedDate = currentMsgDate;
    });
    
    container.appendChild(fragment);
    UI.scrollToBottom('auto');

    const loaderButton = document.getElementById('pagination-loader');
    loaderButton.onclick = App.loadMoreMessages;
    
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !chatPagination.isLoading && !chatPagination.allLoaded) {
            loaderButton.click();
        }
    });
    observer.observe(loaderButton);

    chatPagination.page = 1;
    chatPagination.allLoaded = (data || []).length < chatPagination.pageSize;
    loaderButton.style.display = chatPagination.allLoaded ? 'none' : 'block';
App.autoShowLastMessageSeenList();
    App.updateLastMessageSeenDisplay();
},

redrawMessageBatchAndReference: (newMessages, referenceMessage) => {
    const container = document.getElementById('messages-container');
    const oldScrollHeight = container.scrollHeight;
    
    // إزالة الـ reference إذا موجود
    const refElement = App.displayedMessages.get(referenceMessage?.id);
    if (refElement) refElement.remove();
    
    const fragment = document.createDocumentFragment();
    let lastProcessedDate = null;

    // جديد: للحصول على السياق الكامل، نستخدم currentChatState.messages كمرجع
    // نفترض إن newMessages هي الرسائل الجديدة المحملة (الأقدم)، ونحدد مؤشراتها
    const allMessages = currentChatState.messages; // كل الرسائل في الترتيب الزمني (قديم إلى جديد)
    const newMessagesStartIndex = allMessages.indexOf(newMessages[0]); // بداية الـ batch الجديدة
    const newMessagesEndIndex = newMessagesStartIndex + newMessages.length - 1;

    // معالجة الـ newMessages
    newMessages.forEach((msg, batchIndex) => {
        const globalIndex = newMessagesStartIndex + batchIndex;
        const currentMsgDate = new Date(msg.created_at);
        
        // إضافة separator إذا لزم
        if (lastProcessedDate && !isSameDay(currentMsgDate, lastProcessedDate)) {
            fragment.appendChild(UI.createDateSeparatorElement(UI.formatDateSeparator(lastProcessedDate)));
        }
        
        // تحديد prev/next من السياق الكامل (مش بس الـ batch)
        const globalPrev = allMessages[globalIndex - 1] || null;
        const globalNext = allMessages[globalIndex + 1] || null;
        
        // flags محسنة: أول/أخير للمرسل بناءً على السياق الكامل
        const isFirstFromSender = !globalPrev || globalPrev.sender_id !== msg.sender_id;
        const isLastFromSender = !globalNext || globalNext.sender_id !== msg.sender_id;
        
        // إنشاء العنصر: اسم بس إذا أول، صورة بس إذا أخير
        const messageElement = UI.createMessageElement(msg, globalNext, globalPrev, isFirstFromSender, isLastFromSender);
        fragment.appendChild(messageElement);
        App.displayedMessages.set(msg.id, messageElement);
        lastProcessedDate = currentMsgDate;
    });

    // معالجة الـ reference إذا موجود
    if (referenceMessage) {
        const refGlobalIndex = allMessages.indexOf(referenceMessage);
        if (!isSameDay(new Date(referenceMessage.created_at), lastProcessedDate)) {
            fragment.appendChild(UI.createDateSeparatorElement(UI.formatDateSeparator(referenceMessage.created_at)));
        }
        
        const refPrev = allMessages[refGlobalIndex - 1] || null;
        const refNext = allMessages[refGlobalIndex + 1] || null;
        
        const isRefFirstFromSender = !refPrev || refPrev.sender_id !== referenceMessage.sender_id;
        const isRefLastFromSender = !refNext || refNext.sender_id !== referenceMessage.sender_id;
        
        const updatedRefElement = UI.createMessageElement(referenceMessage, refNext, refPrev, isRefFirstFromSender, isRefLastFromSender);
        fragment.appendChild(updatedRefElement);
        App.displayedMessages.set(referenceMessage.id, updatedRefElement);
    }
    
    // إضافة في البداية (للرسائل القديمة)
    container.prepend(fragment);
    
    // تعديل الـ scroll للحفاظ على الموقع (بناءً على الارتفاع الجديد)
    const newScrollHeight = container.scrollHeight;
    container.scrollTop = newScrollHeight - oldScrollHeight;
},


loadMoreMessages: async () => {
    if (chatPagination.isLoading || chatPagination.allLoaded) return;
    chatPagination.isLoading = true;

    const container = document.getElementById('messages-container');
    const oldScrollHeight = container.scrollHeight;

    const oldestMessage = currentChatState.messages[0];
    if (!oldestMessage) {
        chatPagination.isLoading = false;
        return;
    }
    const oldestTimestamp = oldestMessage.created_at;

    const { data, error } = await client.from('messages')
        .select(`*, replied_message:replying_to_message_id(*), message_receipts(user_id)`)
        .eq('chat_id', currentChatId)
        .lt('created_at', oldestTimestamp)
        .order('created_at', { ascending: false })
        .limit(chatPagination.pageSize);

    if (!error && data && data.length > 0) {
        const processedData = data.map(msg => {
            if (chatPartner && msg.user_id === currentUser.id && msg.message_receipts) {
                const hasBeenSeenByPartner = msg.message_receipts.some(receipt => receipt.user_id === chatPartner.id);
                if (hasBeenSeenByPartner) {
                    return { ...msg, status: 'seen' };
                }
            }
            return msg;
        });

        const olderMessages = processedData.slice().reverse();
        currentChatState.messages.unshift(...olderMessages);

        const fragment = document.createDocumentFragment();
        olderMessages.forEach((msg, index) => {
            const previousMessage = olderMessages[index - 1] || null;
            const nextMessage = (index === olderMessages.length - 1) ? oldestMessage : olderMessages[index + 1];
            const messageElement = UI.createMessageElement(msg, previousMessage, nextMessage);
            fragment.appendChild(messageElement);
            App.displayedMessages.set(msg.id, messageElement);
        });

        container.prepend(fragment);

        const oldJoinMessageElement = App.displayedMessages.get(oldestMessage.id);
        if (oldJoinMessageElement) {
            const newPreviousForJoin = olderMessages[olderMessages.length - 1];
            const newNextForJoin = currentChatState.messages[currentChatState.messages.indexOf(oldestMessage) + 1] || null;
            const updatedJoinElement = UI.createMessageElement(oldestMessage, newPreviousForJoin, newNextForJoin);
            oldJoinMessageElement.replaceWith(updatedJoinElement);
            App.displayedMessages.set(oldestMessage.id, updatedJoinElement);
        }

        container.scrollTop = container.scrollHeight - oldScrollHeight;
    }

    chatPagination.allLoaded = !data || data.length < chatPagination.pageSize;
    chatPagination.isLoading = false;

    if (chatPagination.allLoaded) {
        document.getElementById('pagination-loader').style.display = 'none';
    }
},

   sendMessage: async () => {
    TypingHandler.sendTypingEvent(false);
    const input = document.getElementById('message-input');
    const content = input.value.trim();

    if (content === '') {
        input.value = "";
        input.style.height = "auto";
        if(currentChatId) delete chatDrafts[currentChatId];
        return;
    }

    // --- بداية الحل النهائي ---

    // 1. تحقق مما إذا كنا نحتاج لإعادة الرسم
    let needsFullRedraw = false;
    if (currentChatState.messages.length > 0) {
        const lastMessage = currentChatState.messages[currentChatState.messages.length - 1];
        if (!isSameDay(new Date(), new Date(lastMessage.created_at))) {
            needsFullRedraw = true;
        }
    } else {
        needsFullRedraw = true; // أول رسالة في المحادثة دائمًا تحتاج لرسم التاريخ
    }

    // 2. إرسال الرسالة إلى السيرفر
    const replyInfo = chatReplies[currentChatId] || null;
    input.value = "";
    input.style.height = "auto";
    UI.hideReplyPreview();
    if(currentChatId) delete chatReplies[currentChatId];

    const { data: insertedMessage, error } = await client.from("messages").insert({
        chat_id: currentChatId, user_id: currentUser.id, content: content,
        type: "text", replying_to_message_id: replyInfo ? replyInfo.id : null
    }).select("*, updated_at, replied_message:replying_to_message_id(*, sender:profiles!messages_user_id_fkey(*))").single();

    if (error) {
        UI.showToast("فشل إرسال الرسالة.");
        input.value = content; // أعد النص للمستخدم ليحاول مرة أخرى
        return;
    }

    // 3. اتخاذ القرار: إعادة رسم كاملة أم إضافة بسيطة؟
    if (needsFullRedraw) {
        // إذا كانت هذه أول رسالة في اليوم، قم بإعادة تحميل كل شيء بهدوء
        await App.loadInitialMessages();
    } else {
        // إذا لم تكن، فقط أضف الرسالة الجديدة كالمعتاد
        App.renderMessageBatch([insertedMessage], 'append');
        currentChatState.messages.push(insertedMessage);
        UI.scrollToBottom('smooth');
    }

    delete chatDrafts[currentChatId];
    
    // --- نهاية الحل النهائي ---
},


    handleFileUpload: async event => {
    const replyingToMessage = chatReplies[currentChatId] || null;
    for (const file of event.target.files) {
        let type = "file";
        if (file.type.startsWith("image/")) type = "image";
        else if (file.type.startsWith("video/")) type = "video";
        else if (file.type.startsWith("audio/")) type = "audio";

        const tempUrl = URL.createObjectURL(file);
        const tempId = `temp-${Date.now()}`;
        
        const controller = new AbortController();
        uploadControllers[tempId] = controller;

        const optimisticMessage = {
            id: tempId, temp_id: tempId, content: file.name, type: type, file_url: tempUrl,
            user_id: currentUser.id, status: "sending", created_at: (new Date).toISOString(),
            replying_to_message_id: replyingToMessage ? replyingToMessage.id : null,
            replied_message: replyingToMessage
        };

        currentChatState.messages.unshift(optimisticMessage);
        UI.addMessage(optimisticMessage, App.displayedMessages);
        UI.hideReplyPreview();
        if (currentChatId) delete chatReplies[currentChatId];

        try {
            const filePath = `user_files/${currentUser.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, "")}`;
            const { error: uploadError } = await client.storage.from("user_files").upload(filePath, file, {
                signal: controller.signal
            });
            if (uploadError) {
                if (uploadError.name === 'AbortError') {
                    console.log('Upload cancelled for', tempId);
                    return; 
                }
                throw uploadError;
            }

            delete uploadControllers[tempId]; 
            
            const { data: { publicUrl } } = client.storage.from("user_files").getPublicUrl(filePath);
            const messageData = {
                chat_id: currentChatId, user_id: currentUser.id, content: file.name, type: type,
                file_url: publicUrl, replying_to_message_id: optimisticMessage.replying_to_message_id
            };
            const { data: insertedMessage, error: insertError } = await client.from("messages").insert(messageData)
                .select("*, replied_message:replying_to_message_id(*, sender:profiles!messages_user_id_fkey(*))").single();
            if (insertError) throw insertError;

            if (insertedMessage) {
                const msgIndex = currentChatState.messages.findIndex(m => m.temp_id === tempId);
                if (msgIndex !== -1) currentChatState.messages[msgIndex] = insertedMessage;
                
                const tempElement = App.displayedMessages.get(tempId);
                if (tempElement) {
                    tempElement.dataset.messageId = insertedMessage.id;
                    const statusTextElement = tempElement.querySelector('.message-status-text');
                    if (statusTextElement) statusTextElement.textContent = UI.getMessageStatusText(insertedMessage);
                    App.displayedMessages.delete(tempId);
                    App.displayedMessages.set(insertedMessage.id, tempElement);
                }
            }
        } catch (error) {
            if (error.name !== 'AbortError') {
                const tempElement = document.querySelector(`[data-message-id="${tempId}"]`);
                if (tempElement) {
                    tempElement.style.opacity = "0.5";
                    tempElement.setAttribute("title", `فشل الإرسال: ${error.message}`);
                }
            }
        }
    }
    event.target.value = "";
},

unsendMessage: async message => {
    const isTemporary = String(message.id).startsWith('temp-');

    const confirmed = await UI.showConfirm("هل أنت متأكد من إلغاء إرسال هذه الرسالة؟ سيتم حذفها لدى الجميع.");
    if (!confirmed) return;

    if (isTemporary) {
        if (uploadControllers[message.id]) {
            uploadControllers[message.id].abort();
            delete uploadControllers[message.id];
        }
        App.handleDeletedMessage({ id: message.id });
    } else {
        const { error } = await client.from("messages").delete().eq("id", message.id);
        if (!error) {
            App.handleDeletedMessage({ id: message.id });
            if (chatUpdatesChannel) {
                chatUpdatesChannel.send({ type: "broadcast", event: "message-deleted", payload: { id: message.id } });
            }
            if (message.file_url) {
                try {
                    const filePath = (new URL(message.file_url)).pathname.split("/user_files/")[1];
                    if (filePath) await client.storage.from("user_files").remove([filePath]);
                } catch (e) { console.error("Failed to delete file from storage:", e); }
            }
        } else {
             UI.showToast("فشل إلغاء الإرسال من السيرفر.");
        }
    }

const AudioManager = {
    currentPlaying: null,
    currentAudioElement: null,

    createAudioPlayerHTML: (fileUrl) => {
        return `
            <div class="custom-audio-player" data-audio-url="${fileUrl}">
                <button class="audio-play-pause-btn">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
                </button>
                <div class="audio-progress-bar">
                    <div class="audio-progress"></div>
                </div>
                <span class="audio-time">0:00</span>
            </div>
        `;
    },

    initPlayer: (playerElement) => {
    const playPauseBtn = playerElement.querySelector('.audio-play-pause-btn');
    const progressBarContainer = playerElement.querySelector('.audio-progress-bar');
    const audioUrl = playerElement.dataset.audioUrl;

    playPauseBtn.onclick = () => AudioManager.togglePlay(playerElement, audioUrl);

    progressBarContainer.onclick = (e) => {
        // الشرط الجديد: تأكد من أن المقطع الصوتي موجود وأن مدته هي رقم صالح
        if (AudioManager.currentAudioElement && AudioManager.currentPlaying === playerElement && isFinite(AudioManager.currentAudioElement.duration)) {
            const rect = progressBarContainer.getBoundingClientRect();
            const clickPosition = e.clientX - rect.left;
            const percentage = clickPosition / rect.width;
            AudioManager.currentAudioElement.currentTime = AudioManager.currentAudioElement.duration * percentage;
        }
    };
    AudioManager.fetchAndSetDuration(audioUrl, playerElement.querySelector('.audio-time'));
},

    togglePlay: (playerElement, audioUrl) => {
        const playIcon = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>`;
        const pauseIcon = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M14,19H18V5H14M6,19H10V5H6V19Z" /></svg>`;
        const playPauseBtn = playerElement.querySelector('.audio-play-pause-btn');

        if (AudioManager.currentPlaying === playerElement) {
            if (AudioManager.currentAudioElement.paused) {
                AudioManager.currentAudioElement.play();
                playPauseBtn.innerHTML = pauseIcon;
            } else {
                AudioManager.currentAudioElement.pause();
                playPauseBtn.innerHTML = playIcon;
            }
        } else {
            if (AudioManager.currentPlaying) {
                AudioManager.stopPlayback();
            }
            
            AudioManager.currentPlaying = playerElement;
            AudioManager.currentAudioElement = new Audio(audioUrl);
            
            AudioManager.currentAudioElement.play();
            playPauseBtn.innerHTML = pauseIcon;

            AudioManager.currentAudioElement.addEventListener('timeupdate', () => {
                if (AudioManager.currentPlaying !== playerElement) return;
                const progressIndicator = playerElement.querySelector('.audio-progress');
                const timeDisplay = playerElement.querySelector('.audio-time');
                if (progressIndicator && timeDisplay && !isNaN(AudioManager.currentAudioElement.duration)) {
                    const percentage = (AudioManager.currentAudioElement.currentTime / AudioManager.currentAudioElement.duration) * 100;
                    progressIndicator.style.width = `${percentage}%`;
                }
            });
            
            AudioManager.currentAudioElement.addEventListener('ended', () => {
                const endedElement = AudioManager.currentPlaying;
                AudioManager.stopPlayback();
                if(endedElement) AudioManager.fetchAndSetDuration(audioUrl, endedElement.querySelector('.audio-time'));
            });
        }
    },

    stopPlayback: () => {
        if (!AudioManager.currentPlaying || !AudioManager.currentAudioElement) return;

        const playIcon = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>`;
        const playPauseBtn = AudioManager.currentPlaying.querySelector('.audio-play-pause-btn');
        const progressIndicator = AudioManager.currentPlaying.querySelector('.audio-progress');
        
        AudioManager.currentAudioElement.pause();
        playPauseBtn.innerHTML = playIcon;
        progressIndicator.style.width = `0%`;
        
        AudioManager.currentPlaying = null;
        AudioManager.currentAudioElement = null;
    },

    fetchAndSetDuration: (audioUrl, timeDisplayElement) => {
        if (!timeDisplayElement) return;
        const tempAudio = new Audio(audioUrl);
        tempAudio.addEventListener('loadedmetadata', () => {
            if (!isNaN(tempAudio.duration)) {
                timeDisplayElement.textContent = AudioManager.formatTime(tempAudio.duration);
            }
        });
    },

    formatTime: (seconds) => {
        if (isNaN(seconds)) return "0:00";
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${minutes}:${String(secs).padStart(2, '0')}`;
    }
};





const Call = {
    ringtone: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'),
    
    state: {
        isActive: false, partner: null, callType: null, from: null,
        peerConnection: null, localStream: null, remoteStream: null,
        isMuted: false, isCameraOff: false, incomingOffer: null,
        callerName: null
    },
    
    config: { 
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ],
        iceCandidatePoolSize: 10 
    },

    init: () => {
        if (!currentUser || !currentUser.id) return;
        Call.ringtone.loop = true;
        Call.ringtone.load();
        
        const channelName = `calls-${currentUser.id}`;
        client.removeChannel(client.channel(channelName));
        
        const myChannel = client.channel(channelName);
        myChannel.on('broadcast', { event: 'call-event' }, ({ payload }) => {
            Call.handleEvent(payload);
        }).subscribe();
    },

    async sendSignal(type, data) {
        const partnerId = this.state.partner?.id || chatPartner?.id;
        if (!partnerId) return;
        
        const channel = client.channel(`calls-${partnerId}`, {
            config: { broadcast: { self: true } }
        });
        
        await new Promise(resolve => {
            channel.subscribe(status => {
                if (status === 'SUBSCRIBED') resolve();
            });
        });

        await channel.send({
            type: 'broadcast', 
            event: 'call-event',
            payload: { type: type, sender: currentUser, recipientId: partnerId, data: data }
        });

        setTimeout(() => client.removeChannel(channel), 2000);
    },

    async initiateCall(type) {
        if (!chatPartner || !chatPartner.id) {
            UI.showToast("يجب أن تكون داخل محادثة خاصة للاتصال.");
            return; 
        }
        if (this.state.isActive) return;

        this.state = { ...this.state, isActive: true, partner: chatPartner, callType: type, from: 'me' };
        this.renderUI('ringing-outgoing');
        UI.openModal('call-modal');
        
        try {
            await this.setupMedia(type === 'video');
            await this.createPeerConnection();
            const offer = await this.state.peerConnection.createOffer({
                offerToReceiveAudio: true,
                offerToReceiveVideo: type === 'video'
            });
            await this.state.peerConnection.setLocalDescription(offer);
            this.sendSignal('offer', { sdp: offer, callType: type });
        } catch (err) { 
            console.error("Init Error:", err);
            if (!this.state.localStream) this.cleanup(); 
        }
    },

    async acceptCall() {
        if (!this.state.incomingOffer) return;
        
        this.ringtone.pause();
        this.ringtone.currentTime = 0;

        this.renderUI('connecting');
        try {
            const isVideo = this.state.callType === 'video';
            await this.setupMedia(isVideo);
            await this.createPeerConnection();
            await this.state.peerConnection.setRemoteDescription(new RTCSessionDescription(this.state.incomingOffer));
            const answer = await this.state.peerConnection.createAnswer();
            await this.state.peerConnection.setLocalDescription(answer);
            this.sendSignal('answer', { sdp: answer });
            this.state.incomingOffer = null;
            this.renderUI('connected');
        } catch (err) { 
            console.error("Accept Error:", err); 
            this.cleanup(); 
        }
    },

    hangup() {
        this.sendSignal('hangup');
        this.cleanup();
    },
    
    cleanup() {
        this.ringtone.pause();
        this.ringtone.currentTime = 0;

        if (this.state.localStream) {
            this.state.localStream.getTracks().forEach(track => track.stop());
        }
        if (this.state.peerConnection) {
            this.state.peerConnection.onicecandidate = null;
            this.state.peerConnection.ontrack = null;
            this.state.peerConnection.onconnectionstatechange = null;
            this.state.peerConnection.close();
        }
        
        const localVid = document.getElementById('local-video');
        const remoteVid = document.getElementById('remote-video');
        if(localVid) { localVid.srcObject = null; localVid.muted = true; }
        if(remoteVid) { remoteVid.srcObject = null; }

        this.state = { isActive: false, partner: null, callType: null, from: null, peerConnection: null, localStream: null, remoteStream: null, isMuted: false, isCameraOff: false, incomingOffer: null, callerName: null };
        UI.closeModal('call-modal');
    },

    async handleEvent(payload) {
        if (!payload || !payload.sender) return;
        const signalData = payload.data || {};

        switch (payload.type) {
            case 'offer':
                if (this.state.isActive) return;
                
                Call.ringtone.currentTime = 0;
                this.ringtone.loop = true; console.log("Call: Ringtone loop is set to:", this.ringtone.loop); this.ringtone.play().catch(e => console.log("Call: Audio error:", e));

                this.state = { 
                    ...this.state, 
                    isActive: true, 
                    partner: payload.sender, 
                    callType: signalData.callType || 'video', 
                    from: 'them', 
                    incomingOffer: signalData.sdp,
                    callerName: payload.sender.first_name || payload.sender.username || "مستخدم"
                };

                this.renderUI('ringing-incoming');
                UI.openModal('call-modal');

                const { data: chatData } = await client.rpc('get_chat_id_for_users', {
                    user1_id: currentUser.id,
                    user2_id: payload.sender.id
                });

                if (chatData && chatData.length > 0) {
                    const chatId = chatData[0].chat_id;
                    const { data: nickData } = await client.from('chat_nicknames')
                        .select('nickname')
                        .match({ chat_id: chatId, user_id: payload.sender.id })
                        .single();
                    
                    if (nickData && nickData.nickname) {
                        this.state.callerName = nickData.nickname;
                        const nameEl = document.getElementById('call-name');
                        if (nameEl) nameEl.textContent = this.state.callerName;
                    }
                }
                break;

            case 'answer':
                this.ringtone.pause(); 
                this.ringtone.currentTime = 0;
                if (this.state.peerConnection) {
                    await this.state.peerConnection.setRemoteDescription(new RTCSessionDescription(signalData.sdp));
                    this.renderUI('connected');
                }
                break;

            case 'candidate':
                if (this.state.peerConnection && signalData.candidate) {
                    try {
                        await this.state.peerConnection.addIceCandidate(new RTCIceCandidate(signalData.candidate));
                    } catch(e) { console.error("ICE Error", e); }
                }
                break;

            case 'hangup':
                this.cleanup();
                break;
        }
    },
    
    async setupMedia(videoEnabled) {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("المتصفح لا يدعم الاتصال.");
            throw new Error("No Media Support");
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: videoEnabled ? { 
                    facingMode: 'user', 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 },
                    frameRate: { ideal: 24 } 
                } : false,
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true, 
                    autoGainControl: true 
                }
            });
            this.state.localStream = stream;
            const localVideo = document.getElementById('local-video');
            if (localVideo) {
                localVideo.srcObject = stream;
                localVideo.muted = true; 
                localVideo.volume = 0;
            }
        } catch (e) {
            alert(`خطأ في الوصول للكاميرا/المايك: ${e.message}`);
            throw e;
        }
    },

    async createPeerConnection() {
        this.state.peerConnection = new RTCPeerConnection(this.config);
        this.state.remoteStream = new MediaStream();
        
        const remoteVid = document.getElementById('remote-video');
        if(remoteVid) {
            remoteVid.srcObject = this.state.remoteStream;
            remoteVid.muted = false;
            remoteVid.volume = 1.0;
        }

        this.state.localStream.getTracks().forEach(track => {
            this.state.peerConnection.addTrack(track, this.state.localStream);
        });

        this.state.peerConnection.ontrack = (event) => {
            event.streams[0].getTracks().forEach(track => {
                this.state.remoteStream.addTrack(track);
            });
        };

        this.state.peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                this.sendSignal('candidate', { candidate: event.candidate });
            }
        };

        this.state.peerConnection.onconnectionstatechange = () => {
            const state = this.state.peerConnection.connectionState;
            if (state === 'connected') this.renderUI('connected');
            if (['disconnected', 'failed', 'closed'].includes(state)) this.cleanup();
        };
    },
    
    toggleMute(btn) {
        this.state.isMuted = !this.state.isMuted;
        if(this.state.localStream) {
            const audioTrack = this.state.localStream.getAudioTracks()[0];
            if(audioTrack) audioTrack.enabled = !this.state.isMuted;
        }
        btn.classList.toggle('toggled', this.state.isMuted);
    },

    toggleCamera(btn) {
        if(this.state.callType !== 'video') return;
        this.state.isCameraOff = !this.state.isCameraOff;
        if(this.state.localStream) {
            const videoTrack = this.state.localStream.getVideoTracks()[0];
            if(videoTrack) videoTrack.enabled = !this.state.isCameraOff;
        }
        btn.classList.toggle('toggled', this.state.isCameraOff);
    },

    renderUI(status) {
        const partner = this.state.partner;
        const callType = this.state.callType;
        if (!partner) return;

        const displayName = this.state.callerName || App.getUserDisplayName(partner.id) || partner.first_name || "مستخدم";
        
        const avatarContainer = document.getElementById('call-avatar-container');
        const nameEl = document.getElementById('call-name');
        
        if(avatarContainer) avatarContainer.innerHTML = UI.createAvatar(partner, 120);
        if(nameEl) nameEl.textContent = displayName;
        
        const statusEl = document.getElementById('call-status');
        const actionsEl = document.getElementById('call-actions');
        const videoStreamsEl = document.getElementById('video-streams');
        
        if(videoStreamsEl) videoStreamsEl.style.display = callType === 'video' ? 'block' : 'none';
        
        const acceptBtn = `<button id="call-accept-btn" onclick="Call.acceptCall()"><svg xmlns="http://www.w3.org/2000/svg" height="32" width="32" viewBox="0 0 24 24" fill="currentColor"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57-.35-.11-.74-.03-1.02.24l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.59l2.2-2.21c.28-.26.36-.65.25-1C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1zM19 12h2c0-4.97-4.03-9-9-9v2c3.87 0 7 3.13 7 7zm-4 0h2c0-2.76-2.24-5-5-5v2c1.66 0 3 1.34 3 3z"/></svg></button>`;
        const declineBtn = `<button id="call-decline-btn" onclick="Call.hangup()"><svg xmlns="http://www.w3.org/2000/svg" height="32" width="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg></button>`;
        
        const muteClass = this.state.isMuted ? 'toggled' : '';
        const muteBtn = `<button id="call-mute-btn" class="${muteClass}" onclick="Call.toggleMute(this)"><svg xmlns="http://www.w3.org/2000/svg" height="32" width="32" viewBox="0 0 24 24" fill="currentColor"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg></button>`;
        
        const cameraClass = this.state.isCameraOff ? 'toggled' : '';
        const cameraBtn = callType === 'video' ? `<button id="call-camera-btn" class="${cameraClass}" onclick="Call.toggleCamera(this)"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM15 16H5V8h10v8z"/></svg></button>` : '';

        if(!actionsEl) return;

        switch(status) {
            case 'ringing-incoming':
                if(statusEl) statusEl.textContent = `مكالمة ${callType === 'video' ? 'فيديو' : 'صوتية'} واردة...`;
                actionsEl.innerHTML = acceptBtn + declineBtn;
                break;
            case 'ringing-outgoing':
                if(statusEl) statusEl.textContent = 'جاري الرنين...';
                actionsEl.innerHTML = declineBtn;
                break;
            case 'connecting':
                 if(statusEl) statusEl.textContent = 'جاري الاتصال...';
                 actionsEl.innerHTML = declineBtn;
                 break;
            case 'connected':
                if(statusEl) statusEl.textContent = 'المكالمة متصلة';
                actionsEl.innerHTML = muteBtn + cameraBtn + declineBtn;
                if (callType === 'video' && avatarContainer && nameEl && statusEl) {
                    avatarContainer.style.display = 'none';
                    nameEl.style.display = 'none';
                    statusEl.style.position = 'absolute';
                    statusEl.style.top = '20px';
                    statusEl.style.left = '20px';
                    statusEl.style.zIndex = '10';
                }
                break;
        }
    }
};









const TypingHandler = {
    typingTimeout: null,
    typingInterval: null,
    currentlyTyping: new Map(), // الخريطة الجديدة لتتبع كل من يكتب

    onUserInput: () => {
        if (!TypingHandler.typingInterval) {
            TypingHandler.sendTypingEvent(true);
            TypingHandler.typingInterval = setInterval(() => {
                TypingHandler.sendTypingEvent(true);
            }, 1500);
        }
        clearTimeout(TypingHandler.typingTimeout);
        TypingHandler.typingTimeout = setTimeout(() => {
            clearInterval(TypingHandler.typingInterval);
            TypingHandler.typingInterval = null;
            TypingHandler.sendTypingEvent(false);
        }, 2000);
    },

    sendTypingEvent: (isTyping) => {
        if (!chatUpdatesChannel || !currentChatId) return;
        chatUpdatesChannel.send({ type: 'broadcast', event: 'typing', payload: { user_id: currentUser.id, is_typing: isTyping } });
    },

    handleIncomingTyping: (payload) => {
        if (!currentChatObject || payload.user_id === currentUser.id) return;

        const userId = payload.user_id;

        // إذا كان الشخص يكتب بالفعل، قم بإلغاء مؤقته القديم
        if (TypingHandler.currentlyTyping.has(userId)) {
            clearTimeout(TypingHandler.currentlyTyping.get(userId));
        }

        if (payload.is_typing) {
            // أضف الشخص إلى القائمة مع مؤقت جديد لمدة 3 ثوانٍ
            const timeoutId = setTimeout(() => {
                TypingHandler.currentlyTyping.delete(userId);
                TypingHandler.updateTypingUI(); // حدث الواجهة عند انتهاء وقته
            }, 3000);
            TypingHandler.currentlyTyping.set(userId, timeoutId);
        } else {
            // إذا أرسل "توقف عن الكتابة"، احذفه من القائمة
            TypingHandler.currentlyTyping.delete(userId);
        }

        // حدث الواجهة فوراً
        TypingHandler.updateTypingUI();
    },

    updateTypingUI: () => {
        const typingUserIds = Array.from(TypingHandler.currentlyTyping.keys());
        if (typingUserIds.length === 0) {
            App.updateChatHeaderSubtext({ isTyping: false });
            return;
        }

        const typingProfiles = typingUserIds.map(id => 
            currentChatObject.participants.find(p => p.id === id)
        ).filter(Boolean);

        App.updateChatHeaderSubtext({ isTyping: true, users: typingProfiles });
    },

    hideTypingIndicators: () => {
        // هذه الدالة لم تعد ضرورية بنفس الطريقة، لكننا نبقيها فارغة للاحتياط
    },
};
    




    async function startChatFromAnywhere(targetUserId) {
    if (!currentUser || targetUserId === currentUser.id) return;

    UI.closeModal("member-options-modal");
    UI.closeModal("new-chat-modal"); // للتأكد من إغلاق نافذة المحادثة الجديدة أيضاً

    try {
        // الخطوة 1: ابحث عن المحادثة أو أنشئها (هذا الجزء يعمل بشكل صحيح)
        const { data: existingChats, error: rpcError } = await client.rpc('get_chat_id_for_users', {
            user1_id: currentUser.id,
            user2_id: targetUserId
        });

        if (rpcError) throw rpcError;

        let chatId;
        if (existingChats && existingChats.length > 0) {
            chatId = existingChats[0].chat_id;
        } else {
            const { data: newChat, error: chatError } = await client.from("chats")
                .insert({ is_group: false, created_by: currentUser.id })
                .select()
                .single();
            
            if (chatError) throw chatError;

            const { error: participantsError } = await client.from("chat_participants").insert([
                { chat_id: newChat.id, user_id: currentUser.id },
                { chat_id: newChat.id, user_id: targetUserId }
            ]);

            if (participantsError) throw participantsError;
            
            chatId = newChat.id;
        }
        
        // --- الإصلاح النهائي هنا ---

        // الخطوة 2: احصل على بيانات المحادثة الكاملة
        const { data: chatObject, error: fetchError } = await client.from('chats')
            .select('*, participants:chat_participants(*, profile:profiles(*))')
            .eq('id', chatId)
            .single();

        if (fetchError) throw fetchError;

        // الخطوة 3 (الأهم): قم بتغيير الرابط يدوياً (إعطاء هوية للمتصفح)
        history.pushState({ view: 'chat', chatId: chatId }, "", `?id=${chatId}`);

        // الخطوة 4 (الأخيرة): استدع الدالة لرسم الواجهة، مع إخبارها ألا تقلق بشأن الرابط
        // نستخدم 'true' كمعامل ثالث لإخبارها أننا قمنا بتغيير الرابط بالفعل
        App.openChatRoom(chatId, chatObject, true);

    } catch (e) {
        console.error("فشل في بدء المحادثة:", e);
        UI.showConfirm("فشل إنشاء المحادثة. يرجى المحاولة مرة أخرى.", () => {});
    }
}

    









const Search = {
    results: [],
    currentIndex: -1,
    originalContents: new Map(),

    clearSearch() {
        this.originalContents.forEach((originalHTML, element) => {
            if (element && element.isConnected) {
                element.innerHTML = originalHTML;
            }
        });
        this.results = [];
        this.currentIndex = -1;
        this.originalContents.clear();
        document.getElementById('search-results-count').textContent = '0 / 0';
    },

    performSearch: debounce((term) => {
        Search.clearSearch();
        const searchTerm = term.trim();
        if (searchTerm.length < 2) return;

        const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        
        currentChatState.messages.forEach(msg => {
            if (msg.type === 'text' && msg.content) {
                const messageEl = document.querySelector(`.message-wrapper[data-message-id="${msg.id}"] .message-content`);
                if (messageEl && msg.content.toLowerCase().includes(searchTerm.toLowerCase())) {
                    if (!Search.originalContents.has(messageEl)) {
                        Search.originalContents.set(messageEl, messageEl.innerHTML);
                    }
                    const highlightedHTML = msg.content.replace(regex, `<span class="highlight">$1</span>`);
                    messageEl.innerHTML = highlightedHTML;
                    
                    const highlightsInMsg = messageEl.querySelectorAll('.highlight');
                    highlightsInMsg.forEach(span => Search.results.push(span));
                }
            }
        });
        
        Search.results.reverse();

        if (Search.results.length > 0) {
            Search.currentIndex = 0;
            Search.updateActiveHighlight();
        }
        document.getElementById('search-results-count').textContent = `${Search.currentIndex + 1} / ${Search.results.length}`;
    }, 300),

    navigateToResult(direction) {
        if (this.results.length === 0) return;
        if (direction === 'next') {
            this.currentIndex = (this.currentIndex + 1) % this.results.length;
        } else if (direction === 'prev') {
            this.currentIndex = (this.currentIndex - 1 + this.results.length) % this.results.length;
        }
        this.updateActiveHighlight();
    },

    updateActiveHighlight() {
        this.results.forEach((el, index) => {
            el.classList.toggle('active', index === this.currentIndex);
        });
        const activeEl = this.results[this.currentIndex];
        if (activeEl) {
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        document.getElementById('search-results-count').textContent = `${this.currentIndex + 1} / ${this.results.length}`;
    }
};
