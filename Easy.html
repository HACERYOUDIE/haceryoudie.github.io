<script>
    var SUPABASE_URL = 'https://mrynkcevthcixgvmdndi.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var ui = {
        showNotification: function(msg, type) {
            var area = document.getElementById('notification-area');
            var n = document.createElement('div');
            n.className = 'notification ' + (type || 'error') + ' show';
            n.innerHTML = msg;
            area.appendChild(n);
            setTimeout(function() { n.style.display = 'none'; area.removeChild(n); }, 3500);
        }
    };

    var authFlow = {
        currentStepId: 'step-initial',
        showStep: function(id) {
            var steps = document.getElementsByClassName('form-container');
            for(var i=0; i<steps.length; i++) { steps[i].className = 'form-container'; }
            document.getElementById(id).className = 'form-container active';
            authFlow.currentStepId = id;
            window.scrollTo(0,0);
        },
        togglePasswordVisibility: function(id, el) {
            var inp = document.getElementById(id);
            if (inp.type === 'password') { inp.type = 'text'; el.innerHTML = '🔒'; }
            else { inp.type = 'password'; el.innerHTML = '👁'; }
        },
        previewAvatar: function(e) {
            var f = e.target.files[0];
            if (f) {
                var r = new FileReader();
                r.onload = function(ev) { document.getElementById('avatar-preview').src = ev.target.result; };
                r.readAsDataURL(f);
            }
        },
        validateStep1: function() {
            var e = document.getElementById('register-email').value;
            var p = document.getElementById('register-password').value;
            if (e.indexOf('@gmail.com') === -1) { ui.showNotification('البريد يجب أن يكون @gmail.com'); return; }
            if (p.length < 6) { ui.showNotification('كلمة المرور قصيرة'); return; }
            authFlow.showStep('step-register-2');
        },
        validateStep2: function() {
            if (!document.getElementById('register-firstname').value) { ui.showNotification('الاسم الأول مطلوب'); return; }
            authFlow.showStep('step-register-3');
        },
        validateStep3: function() {
            if (!document.getElementById('register-birthdate').value) { ui.showNotification('التاريخ مطلوب'); return; }
            authFlow.showStep('step-register-4');
        },
        validateStep4: function() {
            if (!document.getElementById('register-gender').value) { ui.showNotification('اختر الجنس'); return; }
            authFlow.showStep('step-register-5');
        }
    };

    var auth = {
        login: function(btn) {
            btn.disabled = true;
            var e = document.getElementById('login-email').value;
            var p = document.getElementById('login-password').value;
            client.auth.signInWithPassword({email: e, password: p}).then(function(res) {
                if (res.error) throw res.error;
                ui.showNotification('تم الدخول بنجاح', 'success');
                setTimeout(function(){ window.location.href = '/'; }, 1000);
            })['catch'](function(err) {
                ui.showNotification(err.message);
                btn.disabled = false;
            });
        },
        register: function(btn) {
            btn.disabled = true;
            var email = document.getElementById('register-email').value;
            var pass = document.getElementById('register-password').value;
            var fName = document.getElementById('register-firstname').value;
            var lName = document.getElementById('register-lastname').value;
            var bDate = document.getElementById('register-birthdate').value;
            var gen = document.getElementById('register-gender').value;

            client.auth.signUp({email: email, password: pass}).then(function(res) {
                if (res.error) throw res.error;
                var uid = res.data.user.id;
                var uName = fName.toLowerCase() + Math.floor(Math.random()*10000);
                var prof = {
                    username: uName,
                    first_name: fName,
                    last_name: lName,
                    birth_date: bDate,
                    gender: gen,
                    avatar_url: document.getElementById('avatar-preview').src
                };
                return client.from('profiles').update(prof).eq('id', uid);
            }).then(function(upRes) {
                ui.showNotification('تم إنشاء الحساب', 'success');
                setTimeout(function(){ window.location.href = '/'; }, 1500);
            })['catch'](function(err) {
                ui.showNotification(err.message);
                btn.disabled = false;
            });
        }
    };

    (function authGuard() {
        client.auth.getSession().then(function(res) {
            if (res.data.session) {
                client.from('profiles').select('id').eq('id', res.data.session.user.id).single().then(function(p) {
                    if (!p.error) window.location.replace('/');
                });
            }
        });
    })();
</script>
