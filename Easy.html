<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MESTORYS DOS v1.0</title>
    <style>
        body { 
            background-color: #000000; 
            color: #AAAAAA; /* Gray text like DOS */
            font-family: "Courier New", Courier, monospace; 
            font-size: 16px; 
            margin: 0; 
            padding: 20px;
            line-height: 1.2;
        }
        .container {
            border: 2px solid #FFFFFF;
            padding: 10px;
            width: 400px;
            margin: 0 auto;
            position: relative;
        }
        .header {
            background-color: #AAAAAA;
            color: #000000;
            padding: 2px 10px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
        input {
            background-color: #000000;
            color: #00FF00; /* Green CRT text */
            border: 1px solid #AAAAAA;
            font-family: inherit;
            width: 100%;
            margin-bottom: 10px;
            outline: none;
        }
        input:focus { border-color: #00FF00; }
        .btn {
            background-color: #AAAAAA;
            color: #000000;
            border: none;
            padding: 5px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: #FFFFFF; }
        #log {
            margin-top: 20px;
            color: #00FF00;
            font-size: 12px;
            height: 60px;
            overflow: hidden;
        }
        .blink { animation: blinker 1s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">MESTORYS LOGIN SYSTEM v1.0</div>
    
    C:\> ENTER CREDENTIALS...<br><br>
    
    EMAIL: <br>
    <input type="text" id="u" autocomplete="off"><br>
    
    PASSWORD: <br>
    <input type="password" id="p" autocomplete="off"><br>
    
    <button class="btn" onclick="run()">[ LOGIN ]</button>
    
    <div id="log">
        READY...<span class="blink">_</span>
    </div>
</div>

<script type="text/javascript">
    function run() {
        var u = document.getElementById('u').value;
        var p = document.getElementById('p').value;
        var l = document.getElementById('log');
        
        l.innerHTML = "CONNECTING TO KERNEL...<br>EXECUTING AUTH_REQ...";

        var x = new XMLHttpRequest();
        x.open("POST", "https://mrynkcevthcixgvmdndi.supabase.co/auth/v1/token?grant_type=password", true);
        x.setRequestHeader("Content-Type", "application/json");
        x.setRequestHeader("apikey", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg");

        x.onreadystatechange = function() {
            if (x.readyState == 4) {
                if (x.status == 200) {
                    l.innerHTML += "<br>ACCESS GRANTED. REDIRECTING...";
                    localStorage.setItem('sb-mrynkcevthcixgvmdndi-auth-token', x.responseText);
                    localStorage.setItem('user_verified', 'true');
                    setTimeout(function(){ window.location.href = "/"; }, 500);
                } else {
                    l.innerHTML = "ERROR: INVALID_INTERRUPT (" + x.status + ")<br>ABORT, RETRY, FAIL?";
                }
            }
        };
        x.send('{"email":"'+u+'","password":"'+p+'"}');
    }
</script>

</body>
</html>
