  <title>WELCOME TO MESTORYS</title>
  
  <style>
    :root { --primary-color: #0d6efd; --secondary-color: #42b72a; --background-gray: #f0f2f5; --white: #fff; --border-color: #ced4da; }
    body { font-family: 'Cairo', sans-serif; background: #cfdef3; background: linear-gradient(135deg, #e0eafc, #cfdef3); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; -webkit-user-select: none; user-select: none; text-align: right; }
    .form-wrapper { width: 100%; max-width: 420px; position: relative; min-height: 620px; padding: 0 1rem; box-sizing: border-box;}
    .form-container { background-color: #fff; width: 100%; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); position: absolute; top: 0; left: 0; box-sizing: border-box; transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out; transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .form-container.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
    .form-container.exit-right { transform: translateX(100%); opacity: 0; }
    h2 { text-align: center; color: #1c1e21; margin-bottom: 2rem; font-weight: 700; }
    .input-group { margin-bottom: 1.25rem; position: relative; }
    .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; box-sizing: border-box; text-align: right; }
    .password-toggle { position: absolute; top: 50%; transform: translateY(-50%); left: 16px; cursor: pointer; color: #6c757d; }
    .avatar-upload { text-align: center; margin-bottom: 1rem; }
    .avatar-upload img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid #ced4da; cursor: pointer; background-color: #ffffff; }
    .button-group { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-direction: row-reverse; }
    button { background-color: #0d6efd; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; }
    button.secondary { background-color: #e9ecef; color: #495057; }
    .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #333; color: white; padding: 15px 25px; border-radius: 8px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
    .notification.show { opacity: 1; }
    .notification.success { background-color: #42b72a; }
    .notification.error { background-color: #dc3545; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="notification-area"></div>
  <div class="form-wrapper">
    <div id="step-initial" class="form-container active">
        <h2>MESTORYS مرحباً بك في</h2>
        <div class="input-group"><input type="email" id="login-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <span class="password-toggle" onclick="authFlow.togglePasswordVisibility('login-password', this)">👁</span>
        </div>
        <button onclick="auth.login(this)">تسجيل الدخول</button>
        <div style="text-align:center; margin-top:1.5rem;"><a href="#" onclick="authFlow.showStep('step-register-1'); return false;">ليس لديك حساب؟ إنشاء حساب جديد</a></div>
    </div>
    <div id="step-register-1" class="form-container">
        <h2>إنشاء حساب (1/5)</h2>
        <div class="input-group"><input type="email" id="register-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="password" id="register-password" placeholder="كلمة المرور"></div>
        <div class="button-group"><button onclick="authFlow.showStep('step-initial', true)" class="secondary">الخلف</button><button onclick="authFlow.validateStep1()">التالي</button></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = 'https://mrynkcevthcixgvmdndi.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // المفتاح المختصر
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var ui = {
      showNotification: function(m, t) {
        var c = document.getElementById('notification-area');
        var n = document.createElement('div');
        n.className = 'notification ' + (t || 'error');
        n.innerText = m;
        c.appendChild(n);
        setTimeout(function() { n.className += ' show'; }, 10);
        setTimeout(function() { n.className = n.className.replace(' show', ''); setTimeout(function(){ n.parentNode.removeChild(n); }, 300); }, 4000);
      }
    };

    var authFlow = {
      currentStepId: 'step-initial',
      showStep: function(id, back) {
        var cs = document.getElementById(this.currentStepId);
        var ns = document.getElementById(id);
        cs.className = cs.className.replace(' active', '');
        if (!back) cs.className += ' exit-right';
        ns.className += ' active';
        this.currentStepId = id;
      },
      togglePasswordVisibility: function(id, el) {
        var i = document.getElementById(id);
        i.type = (i.type === 'password' ? 'text' : 'password');
      },
      validateStep1: function() {
        var e = document.getElementById('register-email').value;
        if (e.indexOf('@gmail.com') === -1) return ui.showNotification('غير مسموح ببريد غير @gmail.com');
        this.showStep('step-register-2');
      }
    };

    var auth = {
      login: function(btn) {
        btn.disabled = true;
        var e = document.getElementById('login-email').value;
        var p = document.getElementById('login-password').value;
        client.auth.signInWithPassword({ email: e, password: p }).then(function(res) {
          if (res.error) {
            ui.showNotification(res.error.message);
            btn.disabled = false;
          } else {
            ui.showNotification("تم تسجيل الدخول!", "success");
            setTimeout(function(){ window.location.href = '/'; }, 1500);
          }
        });
      }
    };
  </script>
</body>
</html>
