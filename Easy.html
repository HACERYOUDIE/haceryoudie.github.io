<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MESTORYS KERNEL</title>
    <style>
        /* الألوان الأساسية للـ DOS المطور (Matrix Green & Deep Black) */
        :root { --cmd-green: #00ff41; --cmd-bg: #0a0a0a; --cmd-border: #333; }
        
        body { 
            background-color: var(--cmd-bg); 
            color: var(--cmd-green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 15px; 
            overflow: hidden; /* توفير موارد الرام بمنع السكرول غير الضروري */
        }

        .dos-frame {
            border: 2px solid var(--cmd-border);
            padding: 10px;
            max-width: 350px;
            margin: 20px auto;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .header {
            background: var(--cmd-green);
            color: #000;
            padding: 3px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-line { margin-bottom: 15px; }
        .input-line label { display: block; font-size: 12px; margin-bottom: 5px; }

        input {
            background: transparent;
            border: 1px solid var(--cmd-border);
            color: var(--cmd-green);
            width: 90%;
            padding: 8px;
            font-family: inherit;
            outline: none;
            text-align: left; /* البريد والباسوورد يسار دايماً */
        }

        input:focus { border-color: var(--cmd-green); }

        .btn-exe {
            background: transparent;
            border: 1px solid var(--cmd-green);
            color: var(--cmd-green);
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-exe:active { background: var(--cmd-green); color: #000; }

        /* إشعار تم تسجيل الدخول "دوزي" */
        #notify {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 2px solid var(--cmd-green);
            padding: 20px;
            display: none;
            z-index: 99;
            text-align: center;
            box-shadow: 0 0 50px #000;
        }

        #console-log { font-size: 10px; color: #666; margin-top: 15px; height: 40px; }
        .blink { animation: b 1s step-start infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="dos-frame">
    <div class="header">SYSTEM.AUTH_MANAGER v2.1</div>
    
    <div class="input-line">
        <label>C:\USER\EMAIL_ID></label>
        <input type="text" id="email" spellcheck="false">
    </div>

    <div class="input-line">
        <label>C:\USER\ACCESS_KEY></label>
        <input type="password" id="pass">
    </div>

    <button class="btn-exe" onclick="execAuth()">RUN AUTH_EXE</button>

    <div id="console-log">READY...<span class="blink">_</span></div>
</div>

<div id="notify">
    <div style="font-size: 20px; margin-bottom: 10px;">SUCCESS!</div>
    <div id="msg">تم تسجيل الدخول بنجاح</div>
    <div style="font-size: 10px; margin-top: 10px;">LOADING KERNEL...</div>
</div>

<script>
function execAuth() {
    var e = document.getElementById('email').value;
    var p = document.getElementById('pass').value;
    var log = document.getElementById('console-log');
    var n = document.getElementById('notify');
    
    log.innerHTML = "INITIALIZING REQUEST...<br>SENDING PACKETS...";

    var x = new XMLHttpRequest();
    x.open("POST", "https://mrynkcevthcixgvmdndi.supabase.co/auth/v1/token?grant_type=password", true);
    x.setRequestHeader("Content-Type", "application/json");
    x.setRequestHeader("apikey", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg");

    x.onreadystatechange = function() {
        if (x.readyState == 4) {
            if (x.status == 200 || x.status == 201) {
                // حفظ البيانات يدوياً لسرعة الوصول
                localStorage.setItem('sb-mrynkcevthcixgvmdndi-auth-token', x.responseText);
                localStorage.setItem('user_verified', 'true');
                
                // إظهار الإشعار الصاروخي
                n.style.display = 'block';
                
                // توجيه فوري بعد 800ms لراحة المعالج
                setTimeout(function(){ window.location.replace('/'); }, 800);
            } else {
                log.innerHTML = "<span style='color:red'>ERROR: ACCESS_DENIED ("+x.status+")</span>";
            }
        }
    };
    
    var payload = JSON.stringify({email: e, password: p});
    x.send(payload);
}
</script>

</body>
</html>
