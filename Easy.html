        },
        createInitialsSvg: function(i) { 
            var c = ["#f44336", "#e91e63", "#9c27b0", "#673ab7", "#3f51b5", "#2196f3", "#03a9f4", "#00bcd4", "#009688", "#4caf50", "#8bc34a", "#ffc107", "#ff9800", "#ff5722"], cl = c[Math.floor(Math.random() * c.length)], fS = i.length > 1 ? '80' : '100'; 
            var svg = '<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="100" fill="' + cl + '" /><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="Arial, sans-serif" font-size="' + fS + 'px" font-weight="bold" fill="#ffffff">' + i + '</text></svg>'; 
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))); 
        },
        updateDefaultAvatar: function() { 
            if (document.getElementById('register-avatar-input').files.length > 0) return; 
            var fN = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, ''), lN = document.getElementById('register-lastname').value.replace(/^\s+|\s+$/g, ''), isA = /^[a-zA-Z\s]*$/; 
            if (isA.test(fN) && isA.test(lN) && (fN || lN)) { 
                var i = (fN ? fN.charAt(0) : '') + (lN ? lN.charAt(0) : ''); 
                document.getElementById('avatar-preview').src = authFlow.createInitialsSvg(i.toUpperCase()); 
            } else { 
                document.getElementById('avatar-preview').src = PROFESSIONAL_AVATAR_SVG; 
            } 
        },
        validateStep1: function() { 
            var e = document.getElementById('register-email').value.replace(/^\s+|\s+$/g, ''), p = document.getElementById('register-password').value.replace(/^\s+|\s+$/g, ''); 
            if (e.toLowerCase().indexOf('@gmail.com') === -1) return ui.showNotification('غير مسموح ببريد غير @gmail.com'); 
            if (p.length < 6) return ui.showNotification('يجب أن تكون كلمة المرور 6 أحرف على الأقل.'); 
            authFlow.showStep('step-register-2'); 
        },
        validateStep2: function() { 
            var f = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, ''); 
            if (!f) return ui.showNotification('الاسم الأول مطلوب.'); 
            authFlow.showStep('step-register-3'); 
        },
        validateStep3: function() { 
            var b = document.getElementById('register-birthdate').value; 
            if (!b) return ui.showNotification('تاريخ الميلاد مطلوب.'); 
            authFlow.showStep('step-register-4'); 
        },
        validateStep4: function() { 
            var g = document.getElementById('register-gender').value; 
            if (!g) return ui.showNotification('الرجاء اختيار الجنس.'); 
            authFlow.showStep('step-register-5'); 
        }
    };

    var actions = {
        generateUniqueUsername: function(baseName) {
            var username = baseName.toLowerCase().replace(/^\s+|\s+$/g, '').replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
            if (!username) { 
                return Promise.resolve('user-' + Math.floor(10000000 + Math.random() * 90000000)); 
            }
            return client.from('profiles').select('username').eq('username', username).single().then(function(res) {
                if (res.error) return username;
                return username + '-' + Math.floor(10000000 + Math.random() * 90000000);
            });
        }
    };

    var auth = {
        login: function(btn) {
            btn.disabled = true;
            btn.textContent = 'جارٍ الدخول...';
            var email = document.getElementById('login-email').value.replace(/^\s+|\s+$/g, '');
            var password = document.getElementById('login-password').value.replace(/^\s+|\s+$/g, '');
            client.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
                if (res.error) throw res.error;
                ui.showNotification("تم تسجيل الدخول بنجاح!", "success");
                var iframe = document.createElement('iframe');
                iframe.src = 'https://mestorys.netlify.app/appauth/index.html';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                iframe.onload = function() { iframe.contentWindow.postMessage({ action: 'SAVE_SESSION', session: res.data.session }, '*'); };
                setTimeout(function() { window.location.href = '/'; }, 1500);
            })['catch'](function(err) {
                ui.showNotification("فشل تسجيل الدخول: " + err.message, "error");
            }).then(function() {
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            });
        },
        register: function(btn) {
            btn.disabled = true;
            btn.textContent = 'جارٍ الإنشاء...';
            var email = document.getElementById('register-email').value.replace(/^\s+|\s+$/g, '');
            var password = document.getElementById('register-password').value.replace(/^\s+|\s+$/g, '');
            var fName = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, '');
            var lName = document.getElementById('register-lastname').value.replace(/^\s+|\s+$/g, '');
            var bDate = document.getElementById('register-birthdate').value;
            var gender = document.getElementById('register-gender').value;
            var avatarInput = document.getElementById('register-avatar-input');
            
            client.auth.signUp({ email: email, password: password }).then(function(res) {
                if (res.error) throw res.error;
                var user = res.data.user;
                return actions.generateUniqueUsername(fName).then(function(uName) {
                    var profile = { username: uName, first_name: fName, last_name: lName, birth_date: bDate, gender: gender, avatar_url: document.getElementById('avatar-preview').src };
                    
                    if (avatarInput.files && avatarInput.files[0]) {
                        var file = avatarInput.files[0];
                        var fileExt = file.name.split('.').pop();
                        var filePath = user.id + '/avatar.' + fileExt;
                        return client.storage.from('avatars').upload(filePath, file, { upsert: true }).then(function(upFileRes) {
                            if (!upFileRes.error) {
                                var urlData = client.storage.from('avatars').getPublicUrl(filePath);
                                profile.avatar_url = urlData.data.publicUrl;
                                profile.avatar_path = filePath;
                            }
                            return client.from('profiles').update(profile).eq('id', user.id);
                        });
                    } else {
                        return client.from('profiles').update(profile).eq('id', user.id);
                    }
                }).then(function(upRes) {
                    if (upRes.error) throw upRes.error;
                    ui.showNotification("تم إنشاء الحساب بنجاح!", "success");
                    setTimeout(function() { window.location.href = '/'; }, 2000);
                });
            })['catch'](function(err) {
                ui.showNotification(err.message, "error");
            }).then(function() {
                btn.disabled = false;
                btn.textContent = 'إنهاء';
            });
        }
    };
  
    document.getElementById('register-firstname').addEventListener('input', authFlow.updateDefaultAvatar);
    document.getElementById('register-lastname').addEventListener('input', authFlow.updateDefaultAvatar);
    authGuard();
</script>
</body>
</html>
