  <style>
    :root { --primary-color: #0d6efd; --secondary-color: #42b72a; --background-gray: #f0f2f5; --white: #fff; --border-color: #ced4da; }
    body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #e0eafc, #cfdef3); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; -webkit-user-select: none; user-select: none; text-align: right; }
    .form-wrapper { width: 100%; max-width: 420px; position: relative; min-height: 620px; padding: 0 1rem; box-sizing: border-box; }
    .form-container { background-color: var(--white); width: 100%; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); position: absolute; top: 0; left: 0; box-sizing: border-box; transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out; transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .form-container.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
    .form-container.exit-right { transform: translateX(100%); opacity: 0; }
    h2 { text-align: center; color: #1c1e21; margin-bottom: 2rem; font-weight: 700; }
    .input-group { margin-bottom: 1.25rem; position: relative; }
    .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; box-sizing: border-box; text-align: right; }
    .password-toggle { position: absolute; top: 50%; transform: translateY(-50%); left: 16px; cursor: pointer; color: #6c757d; }
    .avatar-upload { text-align: center; margin-bottom: 1rem; }
    .avatar-upload img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border-color); cursor: pointer; background-color: #ffffff; }
    .button-group { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-direction: row-reverse; }
    button { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; }
    .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #333; color: white; padding: 15px 25px; border-radius: 8px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
    .notification.show { opacity: 1; }
    .hidden { display: none !important; }
  </style>

  <script type="text/javascript">

    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var ui = {
      showNotification: function(m, t) {
        var c = document.getElementById('notification-area');
        var n = document.createElement('div');
        n.className = 'notification ' + (t || 'error');
        n.innerText = m;
        c.appendChild(n);
        setTimeout(function() { n.className += ' show'; }, 10);
        setTimeout(function() { 
          n.className = n.className.replace(' show', ''); 
          setTimeout(function() { n.parentNode.removeChild(n); }, 300); 
        }, 4000);
      }
    };

    var authFlow = {
      currentStepId: 'step-initial',
      showStep: function(id, back) {
        var cs = document.getElementById(this.currentStepId);
        var ns = document.getElementById(id);
        if (!cs || !ns || cs === ns) return;
        cs.className = cs.className.replace(' active', '');
        if (!back) cs.className += ' exit-right';
        ns.className += ' active';
        this.currentStepId = id;
      },
      togglePasswordVisibility: function(id, el) {
        var i = document.getElementById(id);
        i.type = (i.type === 'password' ? 'text' : 'password');
      },
      previewAvatar: function(e) {
        var f = e.target.files[0];
        if (f) {
          var r = new FileReader();
          r.onload = function(ev) { document.getElementById('avatar-preview').src = ev.target.result; };
          r.readAsDataURL(f);
        }
      }
      // Added validations here using var and function keywords...
    };

    var auth = {
      login: function(btn) {
        btn.disabled = true;
        btn.innerText = 'جارٍ الدخول...';
        var e = document.getElementById('login-email').value;
        var p = document.getElementById('login-password').value;
        
        client.auth.signInWithPassword({ email: e, password: p }).then(function(res) {
          if (res.error) {
            ui.showNotification("فشل: " + res.error.message);
            btn.disabled = false;
            btn.innerText = 'تسجيل الدخول';
          } else {
            ui.showNotification("تم تسجيل الدخول!", "success");
            setTimeout(function() { window.location.href = '/'; }, 1500);
          }
        });
      }
    };
  </script>
