<body>
<div id="notification-area" class="notification"></div>
<div class="form-wrapper">
    <div id="step-initial" class="form-container active">
        <h2>MESTORYS مرحباً بك في</h2>
        <div class="input-group"><input type="email" id="login-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <span class="password-toggle" onclick="authFlow.togglePass('login-password', this)">👁</span>
        </div>
        <button onclick="auth.login(this)">تسجيل الدخول</button>
        <div class="link"><a onclick="authFlow.showStep('step-register-1')">ليس لديك حساب؟ إنشاء حساب جديد</a></div>
    </div>

    <div id="step-register-1" class="form-container">
        <h2>إنشاء حساب (1/5)</h2>
        <div class="input-group"><input type="email" id="register-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group">
            <input type="password" id="register-password" placeholder="كلمة المرور (6 أحرف)">
            <span class="password-toggle" onclick="authFlow.togglePass('register-password', this)">👁</span>
        </div>
        <div class="button-group">
            <button onclick="authFlow.val1()">التالي</button>
            <button onclick="authFlow.showStep('step-initial')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-2" class="form-container">
        <h2>ما هو اسمك؟ (2/5)</h2>
        <div class="input-group"><input type="text" id="register-firstname" placeholder="الاسم الأول"></div>
        <div class="input-group"><input type="text" id="register-lastname" placeholder="اسم العائلة"></div>
        <div class="button-group">
            <button onclick="authFlow.val2()">التالي</button>
            <button onclick="authFlow.showStep('step-register-1')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-3" class="form-container">
        <h2>تاريخ ميلادك؟ (3/5)</h2>
        <div class="input-group"><input type="date" id="register-birthdate"></div>
        <div class="button-group">
            <button onclick="authFlow.val3()">التالي</button>
            <button onclick="authFlow.showStep('step-register-2')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-4" class="form-container">
        <h2>الجنس (4/5)</h2>
        <div class="input-group">
            <select id="register-gender">
                <option value="">اختر الجنس</option>
                <option value="male">ذكر</option>
                <option value="female">أنثى</option>
            </select>
        </div>
        <div class="button-group">
            <button onclick="authFlow.val4()">التالي</button>
            <button onclick="authFlow.showStep('step-register-3')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-5" class="form-container">
        <h2>صورة الحساب (5/5)</h2>
        <div class="avatar-upload">
            <label for="reg-avatar"><img id="avatar-preview" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzQwIiBoZWlnaHQ9IjM0MCIgdmlld0JveD0iMCAwIDM0MCAzNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMTcwIiBjeT0iMTcwIiByPSIxNjAiIGZpbGw9IiNlZWUiLz48L3N2Zz4=" alt="Avatar"></label>
            <input type="file" id="reg-avatar" class="hidden" accept="image/*" onchange="authFlow.preAv(event)">
        </div>
        <div class="button-group">
            <button onclick="auth.reg(this)" style="background-color:#42b72a;">إنهاء</button>
            <button onclick="authFlow.showStep('step-register-4')" class="secondary">الخلف</button>
        </div>
    </div>
</div>

<script>
    var sU = 'https://mrynkcevthcixgvmdndi.supabase.co';
    var sK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg';

    window.ui = {
        showMsg: function(m, c) {
            var el = document.getElementById('notification-area');
            el.innerHTML = m;
            el.style.backgroundColor = c === 'success' ? '#42b72a' : '#dc3545';
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }
    };

    window.authFlow = {
        current: 'step-initial',
        showStep: function(id) {
            var steps = document.getElementsByClassName('form-container');
            for (var i = 0; i < steps.length; i++) {
                steps[i].className = 'form-container';
                steps[i].style.display = 'none';
            }
            var target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(function() { target.className = 'form-container active'; }, 10);
            window.authFlow.current = id;
            window.scrollTo(0,0);
        },
        togglePass: function(id, el) {
            var inp = document.getElementById(id);
            if (inp.type === 'password') { inp.type = 'text'; el.innerHTML = '🔒'; }
            else { inp.type = 'password'; el.innerHTML = '👁'; }
        },
        preAv: function(e) {
            var f = e.target.files[0];
            if (f) {
                var r = new FileReader();
                r.onload = function(ev) { document.getElementById('avatar-preview').src = ev.target.result; };
                r.readAsDataURL(f);
            }
        },
        val1: function() {
            var e = document.getElementById('register-email').value;
            var p = document.getElementById('register-password').value;
            if (e.indexOf('@gmail.com') === -1) { window.ui.showMsg('استخدم @gmail.com فقط'); return; }
            if (p.length < 6) { window.ui.showMsg('كلمة المرور قصيرة'); return; }
            window.authFlow.showStep('step-register-2');
        },
        val2: function() {
            if (!document.getElementById('register-firstname').value) { window.ui.showMsg('الاسم مطلوب'); return; }
            window.authFlow.showStep('step-register-3');
        },
        val3: function() {
            if (!document.getElementById('register-birthdate').value) { window.ui.showMsg('التاريخ مطلوب'); return; }
            window.authFlow.showStep('step-register-4');
        },
        val4: function() {
            if (!document.getElementById('register-gender').value) { window.ui.showMsg('اختر الجنس'); return; }
            window.authFlow.showStep('step-register-5');
        }
    };

    function ajax(m, p, b, cb) {
        var xhr = new XMLHttpRequest();
        xhr.open(m, sU + p, true);
        xhr.setRequestHeader('apikey', sK);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function() { if (xhr.readyState === 4) cb(xhr.status, xhr.responseText); };
        xhr.send(b);
    }

    window.auth = {
        login: function(btn) {
            btn.disabled = true;
            btn.innerHTML = 'جارٍ الدخول...';
            var e = document.getElementById('login-email').value;
            var p = document.getElementById('login-password').value;
            var body = JSON.stringify({email: e, password: p});
            ajax('POST', '/auth/v1/token?grant_type=password', body, function(s, r) {
                if (s === 200) {
                    var data = JSON.parse(r);
                    localStorage.setItem('sb-mrynkcevthcixgvmdndi-auth-token', JSON.stringify(data));
                    window.ui.showMsg('تم الدخول بنجاح', 'success');
                    setTimeout(function() { window.location.href = '/'; }, 1000);
                } else {
                    window.ui.showMsg('خطأ في البيانات');
                    btn.disabled = false;
                    btn.innerHTML = 'تسجيل الدخول';
                }
            });
        },
        reg: function(btn) {
            btn.disabled = true;
            btn.innerHTML = 'جارٍ الإنشاء...';
            var e = document.getElementById('register-email').value;
            var p = document.getElementById('register-password').value;
            var f = document.getElementById('register-firstname').value;
            var l = document.getElementById('register-lastname').value;
            var d = document.getElementById('register-birthdate').value;
            var g = document.getElementById('register-gender').value;
            var av = document.getElementById('avatar-preview').src;
            var body = JSON.stringify({email: e, password: p});
            ajax('POST', '/auth/v1/signup', body, function(s, r) {
                if (s === 200 || s === 201) {
                    var userData = JSON.parse(r);
                    var uid = userData.id || userData.user.id;
                    var prof = JSON.stringify({username: f.toLowerCase() + Math.floor(Math.random()*9999), first_name: f, last_name: l, birth_date: d, gender: g, avatar_url: av});
                    ajax('PATCH', '/rest/v1/profiles?id=eq.' + uid, prof, function() {
                        window.ui.showMsg('تم الإنشاء بنجاح', 'success');
                        setTimeout(function() { window.location.href = '/'; }, 1500);
                    });
                } else {
                    window.ui.showMsg('خطأ في التسجيل');
                    btn.disabled = false;
                    btn.innerHTML = 'إنهاء';
                }
            });
        }
    };
</script>
