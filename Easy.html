<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار عرض الصورة</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ccc; margin: 10px; padding: 10px; border-radius: 8px; }
        img { max-width: 300px; border: 2px solid blue; }
        iframe { width: 350px; height: 350px; border: 2px solid red; }
    </style>
</head>
<body>

    <h2>اختبار رابط الصورة المباشر</h2>
    <p>الرابط: <a href="https://mrynkcevthcixgvmdndi.supabase.co/storage/v1/object/public/avatars/c82b7608-3a54-4c2c-83fb-6d683d64186f/1777453037113.jpg" target="_blank">اضغط لفتح الرابط مباشرة</a></p>

    <div class="box">
        <h3>1. عرض عبر وسم img (العادي)</h3>
        <p>إذا ظهرت هنا، فالحل هو تغيير الكود ليعرض src مباشرة.</p>
        <img src="https://mrynkcevthcixgvmdndi.supabase.co/storage/v1/object/public/avatars/c82b7608-3a54-4c2c-83fb-6d683d64186f/1777453037113.jpg" alt="الصورة تالفة في img">
    </div>

    <div class="box">
        <h3>2. عرض عبر iframe</h3>
        <p>إذا لم تظهر هنا، فالسيرفر يمنع تضمين الروابط المباشرة (Frame Protection).</p>
        <iframe src="https://mrynkcevthcixgvmdndi.supabase.co/storage/v1/object/public/avatars/c82b7608-3a54-4c2c-83fb-6d683d64186f/1777453037113.jpg"></iframe>
    </div>

</body>
</html>
