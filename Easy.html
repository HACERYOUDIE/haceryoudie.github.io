<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WELCOME TO MESTORYS</title>
  <style>
    body { 
      background-color: #f0f7ff;
      background: -webkit-gradient(linear, left top, right bottom, from(#e0eafc), to(#cfdef3));
      background: -webkit-linear-gradient(top left, #e0eafc, #cfdef3);
      background: -moz-linear-gradient(top left, #e0eafc, #cfdef3);
      background: -o-linear-gradient(top left, #e0eafc, #cfdef3);
      background: linear-gradient(to bottom right, #e0eafc, #cfdef3);
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: block;
      height: 100%;
    }
    .form-wrapper { 
      width: 90%;
      max-width: 400px;
      margin: 50px auto;
      position: relative;
    }
    .form-container { 
      background-color: #ffffff;
      padding: 30px;
      border: 1px solid #e1e8ed;
      display: none;
      -webkit-border-radius: 40px;
      -moz-border-radius: 40px;
      border-radius: 40px;
      -webkit-box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      -moz-box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h2 { 
      font-size: 22px; 
      color: #1a1a1a; 
      text-align: center; 
      margin-bottom: 25px;
      font-weight: bold;
    }
    .input-group { 
      margin-bottom: 15px; 
      text-align: center;
    }
    .input-group input, .input-group select { 
      width: 85%; 
      padding: 15px 20px; 
      border: 2px solid #f0f0f0; 
      font-size: 16px; 
      direction: rtl;
      outline: none;
      background-color: #f9f9f9;
      -webkit-border-radius: 50px;
      -moz-border-radius: 50px;
      border-radius: 50px;
    }
    .input-group input:focus {
      border-color: #0d6efd;
      background-color: #ffffff;
    }
    .button-group { 
      margin-top: 25px; 
      text-align: center; 
    }
    button { 
      background-color: #0d6efd; 
      color: white; 
      border: none; 
      padding: 15px; 
      font-size: 16px; 
      font-weight: bold; 
      width: 95%; 
      cursor: pointer;
      -webkit-border-radius: 50px;
      -moz-border-radius: 50px;
      border-radius: 50px;
      -webkit-transition: all 0.3s;
      -moz-transition: all 0.3s;
      transition: all 0.3s;
    }
    button:hover {
      background-color: #0056b3;
      -webkit-transform: scale(1.02);
      transform: scale(1.02);
    }
    button.secondary { 
      background-color: #f1f3f5; 
      color: #495057; 
      margin-top: 10px;
    }
    .avatar-upload { 
      text-align: center; 
      margin-bottom: 20px; 
    }
    .avatar-upload img { 
      width: 120px; 
      height: 120px; 
      border: 4px solid #f0f0f0; 
      -webkit-border-radius: 100px;
      -moz-border-radius: 100px;
      border-radius: 100px;
    }
    .link { 
      text-align: center; 
      margin-top: 20px; 
    }
    .link a { 
      color: #0d6efd; 
      text-decoration: none; 
      font-size: 14px;
      cursor: pointer; 
    }
    #notification-area { 
      position: fixed; 
      top: 20px; 
      left: 20px; 
      right: 20px; 
      padding: 15px; 
      color: white; 
      text-align: center; 
      z-index: 10000; 
      display: none; 
      -webkit-border-radius: 20px;
      -moz-border-radius: 20px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <div id="notification-area"></div>

  <div class="form-wrapper">
    <div id="step-initial" class="form-container" style="display: block;">
        <h2>MESTORYS مرحباً بك</h2>
        <div class="input-group"><input type="text" id="login-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="password" id="login-password" placeholder="كلمة المرور"></div>
        <div class="button-group">
            <button onclick="loginUser(this)">تسجيل الدخول</button>
        </div>
        <div class="link">
            <a onclick="showStep('step-register-1')">إنشاء حساب جديد</a>
        </div>
    </div>

    <div id="step-register-1" class="form-container">
        <h2>إنشاء حساب</h2>
        <div class="input-group"><input type="text" id="register-email" placeholder="البريد الإلكتروني"></div>
        <div class="input-group"><input type="password" id="register-password" placeholder="كلمة المرور"></div>
        <div class="button-group">
            <button onclick="valStep1()">التالي</button>
            <button onclick="showStep('step-initial')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-2" class="form-container">
        <h2>من أنت؟</h2>
        <div class="input-group"><input type="text" id="register-firstname" placeholder="الاسم الأول"></div>
        <div class="input-group"><input type="text" id="register-lastname" placeholder="اسم العائلة"></div>
        <div class="button-group">
            <button onclick="valStep2()">التالي</button>
            <button onclick="showStep('step-register-1')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-3" class="form-container">
        <h2>تاريخ ميلادك</h2>
        <div class="input-group"><input type="text" id="register-birthdate" placeholder="YYYY-MM-DD"></div>
        <div class="button-group">
            <button onclick="valStep3()">التالي</button>
            <button onclick="showStep('step-register-2')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-4" class="form-container">
        <h2>الجنس</h2>
        <div class="input-group">
            <select id="register-gender">
                <option value="">اختر الجنس</option>
                <option value="male">ذكر</option>
                <option value="female">أنثى</option>
            </select>
        </div>
        <div class="button-group">
            <button onclick="valStep4()">التالي</button>
            <button onclick="showStep('step-register-3')" class="secondary">الخلف</button>
        </div>
    </div>

    <div id="step-register-5" class="form-container">
        <h2>الخطوة الأخيرة</h2>
        <div class="avatar-upload">
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NjYyI+PHBhdGggZD0iTTEyIDJDMiAyIDIgMTAgMiAxMHM4IDYgMTAgNiAxMC02IDEwLTEwUzIyIDIgMTIgMnoiLz48L3N2Zz4=">
        </div>
        <div class="button-group">
            <button onclick="registerUser(this)" style="background-color:#28a745;">إنشاء الحساب</button>
            <button onclick="showStep('step-register-4')" class="secondary">الخلف</button>
        </div>
    </div>
  </div>

  <script type="text/javascript">
    var sUrl = 'https://mrynkcevthcixgvmdndi.supabase.co';
    var sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg';

    function showMsg(m, color) {
      var box = document.getElementById('notification-area');
      box.innerHTML = m;
      box.style.backgroundColor = color;
      box.style.display = 'block';
      setTimeout(function() { box.style.display = 'none'; }, 3000);
    }

    function showStep(id) {
      var steps = ['step-initial', 'step-register-1', 'step-register-2', 'step-register-3', 'step-register-4', 'step-register-5'];
      for(var i=0; i<steps.length; i++) {
        document.getElementById(steps[i]).style.display = 'none';
      }
      document.getElementById(id).style.display = 'block';
    }

    function valStep1() {
      var e = document.getElementById('register-email').value;
      if(e.indexOf('@gmail.com') == -1) {
        showMsg('يجب استخدام بريد Gmail', '#e74c3c');
        return;
      }
      showStep('step-register-2');
    }

    function valStep2() {
      if(document.getElementById('register-firstname').value == '') {
        showMsg('الاسم مطلوب', '#e74c3c');
        return;
      }
      showStep('step-register-3');
    }

    function valStep3() {
      if(document.getElementById('register-birthdate').value == '') {
        showMsg('التاريخ مطلوب', '#e74c3c');
        return;
      }
      showStep('step-register-4');
    }

    function valStep4() {
      if(document.getElementById('register-gender').value == '') {
        showMsg('حدد الجنس', '#e74c3c');
        return;
      }
      showStep('step-register-5');
    }

    function apiReq(method, path, body, cb) {
      var xhr = new XMLHttpRequest();
      xhr.open(method, sUrl + path, true);
      xhr.setRequestHeader('apikey', sKey);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = function() {
        if(xhr.readyState == 4) {
          cb(xhr.status, xhr.responseText);
        }
      };
      xhr.send(body);
    }

    function loginUser(btn) {
      var email = document.getElementById('login-email').value;
      var pass = document.getElementById('login-password').value;
      if(!email || !pass) return showMsg('أدخل البيانات', '#e74c3c');
      
      btn.innerHTML = 'انتظر...';
      btn.disabled = true;
      
      var data = JSON.stringify({"email": email, "password": pass});
      apiReq('POST', '/auth/v1/token?grant_type=password', data, function(s, r) {
        if(s == 200) {
          showMsg('تم الدخول', '#2ecc71');
          setTimeout(function(){ window.location.href = '/'; }, 1000);
        } else {
          showMsg('خطأ في البيانات', '#e74c3c');
          btn.innerHTML = 'تسجيل الدخول';
          btn.disabled = false;
        }
      });
    }

    function registerUser(btn) {
      var email = document.getElementById('register-email').value;
      var pass = document.getElementById('register-password').value;
      
      btn.innerHTML = 'جارٍ الإنشاء...';
      btn.disabled = true;
      
      var data = JSON.stringify({"email": email, "password": pass});
      apiReq('POST', '/auth/v1/signup', data, function(s, r) {
        if(s == 200 || s == 201) {
          showMsg('تم بنجاح', '#2ecc71');
          setTimeout(function(){ window.location.href = '/'; }, 1000);
        } else {
          showMsg('فشل التسجيل', '#e74c3c');
          btn.innerHTML = 'إنشاء الحساب';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
