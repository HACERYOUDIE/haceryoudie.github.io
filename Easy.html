        updateDefaultAvatar: function() { if (document.getElementById('register-avatar-input').files.length > 0) return; var fN = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, ''), lN = document.getElementById('register-lastname').value.replace(/^\s+|\s+$/g, ''), isA = /^[a-zA-Z\s]*$/; if (isA.test(fN) && isA.test(lN) && (fN || lN)) { var i = (fN ? fN.charAt(0) : '') + (lN ? lN.charAt(0) : ''); document.getElementById('avatar-preview').src = authFlow.createInitialsSvg(i.toUpperCase()); } else { document.getElementById('avatar-preview').src = PROFESSIONAL_AVATAR_SVG; } },
        validateStep1: function() { var e = document.getElementById('register-email').value.replace(/^\s+|\s+$/g, ''), p = document.getElementById('register-password').value.replace(/^\s+|\s+$/g, ''); if (e.toLowerCase().indexOf('@gmail.com') === -1) return ui.showNotification('\u063a\u064a\u0631 \u0645\u0633\u0645\u0648\u062d \u0628\u0628\u0631\u064a\u062f \u063a\u064a\u0631 @gmail.com'); if (p.length < 6) return ui.showNotification('\u064a\u062c\u0628 \u0623\u0646 \u062a\u0643\u0648\u0646 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 6 \u0623\u062d\u0631\u0641 \u0639\u0644\u0649 \u0627\u0644\u0623\u0642\u0644.'); authFlow.showStep('step-register-2'); },
        validateStep2: function() { var f = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, ''); if (!f) return ui.showNotification('\u0627\u0644\u0627\u0633\u0645 \u0627\u0644\u0623\u0648\u0644 \u0645\u0637\u0644\u0648\u0628.'); authFlow.showStep('step-register-3'); },
        validateStep3: function() { var b = document.getElementById('register-birthdate').value; if (!b) return ui.showNotification('\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0645\u064a\u0644\u0627\u062f \u0645\u0637\u0644\u0648\u0628.'); if (b > new Date().toISOString().split('T')[0]) return ui.showNotification('\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0645\u064a\u0644\u0627\u062f \u063a\u064a\u0631 \u0635\u0627\u0644\u062d'); authFlow.showStep('step-register-4'); },
        validateStep4: function() { var g = document.getElementById('register-gender').value; if (!g) return ui.showNotification('\u0627\u0644\u0631\u062c\u0627\u0621 \u0627\u062e\u062a\u064a\u0627\u0631 \u0627\u0644\u062c\u0646\u0633.'); authFlow.showStep('step-register-5'); }
    };

    var actions = {
        generateUniqueUsername: function(baseName) {
            var username = baseName.toLowerCase().replace(/^\s+|\s+$/g, '').replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
            if (!username) {
                return 'user-' + Math.floor(10000000 + Math.random() * 90000000);
            }
            return client.from('profiles').select('username').eq('username', username).single().then(function(res) {
                if (!res.data) return username;
                var finalU = username + '-' + Math.floor(10000000 + Math.random() * 90000000);
                return finalU;
            });
        }
    };

    var auth = {
        login: function(btn) {
            btn.disabled = true;
            btn.textContent = '\u062c\u0627\u0631\u064d \u0627\u0644\u062f\u062e\u0648\u0644...';
            var email = document.getElementById('login-email').value.replace(/^\s+|\s+$/g, '');
            var password = document.getElementById('login-password').value.replace(/^\s+|\s+$/g, '');
            client.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
                if (res.error) throw res.error;
                ui.showNotification("\u062a\u0645 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644 \u0628\u0646\u062c\u0627\u062d!", "success");
                var iframe = document.createElement('iframe');
                iframe.src = 'https://mestorys.netlify.app/appauth/index.html';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                iframe.onload = function() { iframe.contentWindow.postMessage({ action: 'SAVE_SESSION', session: res.data.session }, '*'); };
                setTimeout(function() { window.location.href = '/'; }, 1500);
            })['catch'](function(err) {
                ui.showNotification("\u0641\u0634\u0644 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644: " + err.message, "error");
            }).then(function() {
                btn.disabled = false;
                btn.textContent = '\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644';
            });
        },
        register: function(btn) {
            btn.disabled = true;
            btn.textContent = '\u062c\u0627\u0631\u064d \u0627\u0644\u0625\u0646\u0634\u0627\u0621...';
            var email = document.getElementById('register-email').value.replace(/^\s+|\s+$/g, '');
            var password = document.getElementById('register-password').value.replace(/^\s+|\s+$/g, '');
            var firstName = document.getElementById('register-firstname').value.replace(/^\s+|\s+$/g, '');
            var lastName = document.getElementById('register-lastname').value.replace(/^\s+|\s+$/g, '');
            var birthDate = document.getElementById('register-birthdate').value;
            var gender = document.getElementById('register-gender').value;
            var avatarFile = document.getElementById('register-avatar-input').files[0];
            client.auth.signUp({ email: email, password: password }).then(function(res) {
                if (res.error) throw res.error;
                var user = res.data.user;
                actions.generateUniqueUsername(firstName).then(function(uniqueU) {
                    var profileData = { username: uniqueU, first_name: firstName, last_name: lastName, birth_date: birthDate, gender: gender, avatar_url: document.getElementById('avatar-preview').src };
                    client.from('profiles').update(profileData).eq('id', user.id).then(function(upRes) {
                        if (upRes.error) throw upRes.error;
                        ui.showNotification("\u062a\u0645 \u0625\u0646\u0634\u0627\u0621 \u0627\u0644\u062d\u0633\u0627\u0628 \u0628\u0646\u062c\u0627\u062d!", "success");
                        setTimeout(function() { window.location.href = '/'; }, 2000);
                    });
                });
            })['catch'](function(err) {
                ui.showNotification(err.message, "error");
            }).then(function() {
                btn.disabled = false;
                btn.textContent = '\u0625\u0646\u0647\u0627\u0621';
            });
        }
    };
  
    document.getElementById('register-firstname').addEventListener('input', authFlow.updateDefaultAvatar);
    document.getElementById('register-lastname').addEventListener('input', authFlow.updateDefaultAvatar);
    
    authGuard();
</script>
