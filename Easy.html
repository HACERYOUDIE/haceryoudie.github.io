  <script>
    var SUPABASE_URL = 'https://mrynkcevthcixgvmdndi.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeW5rY2V2dGhjaXhndm1kbmRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5Mzk1NzksImV4cCI6MjA3MTUxNTU3OX0.5Fv2mprNFWNfwtqhX9lZuCDZ5weazFK80YLuJiX6Ejg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    function authGuard() {
      client.auth.getSession().then(function(res) {
        if(res.error) throw res.error;
        if(res.data && res.data.session) {
          client.from('profiles').select('id').eq('id', res.data.session.user.id).single().then(function(pRes) {
            if(pRes.error) throw pRes.error;
            window.location.replace('/');
          }).catch(function(err) {
            client.auth.signOut().then(function(){ window.location.reload(); });
          });
        }
      }).catch(function(err) {
        client.auth.signOut().then(function(){ window.location.reload(); });
      });
    }

    var ui = {
      showNotification: function(m, t) {
        var c = document.getElementById('notification-area');
        var n = document.createElement('div');
        n.className = 'notification ' + (t || 'error');
        n.innerHTML = m;
        c.appendChild(n);
        n.style.display = 'block';
        setTimeout(function() {
          n.style.display = 'none';
          c.removeChild(n);
        }, 4000);
      }
    };

    var authFlow = {
      currentStepId: 'step-initial',
      showStep: function(id) {
        document.getElementById(authFlow.currentStepId).className = 'form-container';
        document.getElementById(id).className = 'form-container active';
        authFlow.currentStepId = id;
      },
      togglePasswordVisibility: function(id) {
        var i = document.getElementById(id);
        if(i.getAttribute('type') === 'password') {
          i.setAttribute('type', 'text');
        } else {
          i.setAttribute('type', 'password');
        }
      },
      previewAvatar: function(e) {
        var f = e.target.files[0];
        if (f) {
          var r = new FileReader();
          r.onload = function(ev) {
            document.getElementById('avatar-preview').src = ev.target.result;
          };
          r.readAsDataURL(f);
        }
      },
      validateStep1: function() {
        var e = document.getElementById('register-email').value;
        var p = document.getElementById('register-password').value;
        if (e.toLowerCase().indexOf('@gmail.com') === -1) return ui.showNotification('غير مسموح ببريد غير @gmail.com');
        if (p.length < 6) return ui.showNotification('يجب أن تكون كلمة المرور 6 أحرف على الأقل.');
        authFlow.showStep('step-register-2');
      },
      validateStep2: function() {
        var f = document.getElementById('register-firstname').value;
        if (!f || f === '') return ui.showNotification('الاسم الأول مطلوب.');
        authFlow.showStep('step-register-3');
      },
      validateStep3: function() {
        var b = document.getElementById('register-birthdate').value;
        if (!b || b === '') return ui.showNotification('تاريخ الميلاد مطلوب.');
        authFlow.showStep('step-register-4');
      },
      validateStep4: function() {
        var g = document.getElementById('register-gender').value;
        if (!g || g === '') return ui.showNotification('الرجاء اختيار الجنس.');
        authFlow.showStep('step-register-5');
      }
    };

    var actions = {
      generateUniqueUsername: function(baseName) {
        var username = baseName.toLowerCase().replace(/^\s+|\s+$/g, '').replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        if (!username || username === '') {
          var rNum = Math.floor(10000000 + Math.random() * 90000000);
          return Promise.resolve('user-' + rNum);
        }

        function checkName(finalUsername, attempts) {
          if (attempts >= 10) {
            return Promise.resolve('user-' + new Date().getTime());
          }
          return client.from('profiles').select('username').eq('username', finalUsername).single()
            .then(function(res) {
              if (res.data) {
                var rnd = Math.floor(10000000 + Math.random() * 90000000);
                return checkName(username + '-' + rnd, attempts + 1);
              }
              return finalUsername;
            })
            .catch(function(err) {
              return finalUsername;
            });
        }
        return checkName(username, 0);
      }
    };

    var auth = {
      login: function(btn) {
        btn.disabled = true;
        btn.innerHTML = 'جارٍ الدخول...';
        var email = document.getElementById('login-email').value;
        var password = document.getElementById('login-password').value;
        
        client.auth.signInWithPassword({ email: email, password: password })
          .then(function(res) {
            if (res.error) throw res.error;
            ui.showNotification("تم تسجيل الدخول بنجاح!", "success");
            var iframe = document.createElement('iframe');
            iframe.src = 'https://mestorys.netlify.app/appauth/index.html';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            iframe.onload = function() {
              iframe.contentWindow.postMessage({ action: 'SAVE_SESSION', session: res.data.session }, '*');
            };
            setTimeout(function() { window.location.href = '/'; }, 1500);
          })
          .catch(function(error) {
            ui.showNotification("فشل تسجيل الدخول: " + error.message, "error");
            btn.disabled = false;
            btn.innerHTML = 'تسجيل الدخول';
          });
      },
      register: function(btn) {
        btn.disabled = true;
        btn.innerHTML = 'جارٍ الإنشاء...';
        var email = document.getElementById('register-email').value;
        var password = document.getElementById('register-password').value;
        var firstName = document.getElementById('register-firstname').value;
        var lastName = document.getElementById('register-lastname').value;
        var birthDate = document.getElementById('register-birthdate').value;
        var gender = document.getElementById('register-gender').value;
        var avatarFile = document.getElementById('register-avatar-input').files ? document.getElementById('register-avatar-input').files[0] : null;
        
        client.auth.signUp({ email: email, password: password })
          .then(function(res) {
            if (res.error) throw res.error;
            var user = res.data.user;
            var avatarUrl = document.getElementById('avatar-preview').src;
            var avatarPath = null;
            
            function updateProfile(fName, aUrl, aPath) {
              actions.generateUniqueUsername(fName).then(function(uName) {
                client.from('profiles').update({
                  username: uName,
                  avatar_url: aUrl,
                  avatar_path: aPath,
                  first_name: firstName,
                  last_name: lastName,
                  birth_date: birthDate,
                  gender: gender
                }).eq('id', user.id).then(function(uRes) {
                  if (uRes.error) throw uRes.error;
                  ui.showNotification("تم إنشاء الحساب بنجاح!", "success");
                  client.auth.getSession().then(function(sRes) {
                    if(sRes.data && sRes.data.session) {
                      var iframe = document.createElement('iframe');
                      iframe.src = 'https://mestorys.netlify.app/appauth/index.html';
                      iframe.style.display = 'none';
                      document.body.appendChild(iframe);
                      iframe.onload = function() {
                        iframe.contentWindow.postMessage({ action: 'SAVE_SESSION', session: sRes.data.session }, '*');
                      };
                    }
                  });
                  setTimeout(function() { window.location.href = '/'; }, 2000);
                }).catch(function(err){ throw err; });
              });
            }

            if (avatarFile) {
              var fNameParts = avatarFile.name.split('.');
              var fileExt = fNameParts[fNameParts.length - 1];
              var filePath = user.id + '/avatar.' + fileExt;
              client.storage.from('avatars').upload(filePath, avatarFile, { upsert: true })
                .then(function(upRes) {
                  if(upRes.error) throw upRes.error;
                  var urlData = client.storage.from('avatars').getPublicUrl(filePath);
                  updateProfile(firstName, urlData.data.publicUrl, filePath);
                }).catch(function(err){ throw err; });
            } else {
              updateProfile(firstName, avatarUrl, avatarPath);
            }
          })
          .catch(function(error) {
            ui.showNotification(error.message, "error");
            btn.disabled = false;
            btn.innerHTML = 'إنهاء';
          });
      }
    };
  
    authGuard();
  </script>
