<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>haceryoudie</title>
    <meta name="description" content="haceryoudie">
    <meta property="og:title" content="haceryoudie">
    <meta property="og:description" content="haceryoudie">
    <meta property="og:image" content="https://haceryoudie.github.io/website.png">
    <meta property="og:type" content="website">
    
<script>
        (function() {
            var lang = navigator.language || navigator.userLanguage;
            var path = lang.startsWith('ar') ? '/ar' : '/en';
            window.location.href = path;
        })();
        
        (async function() {
    let path = window.location.pathname;
    if ((path.endsWith('.html') || path.includes('index.html')) && path !== '/404') {
        window.stop();
        try {
            let response = await fetch('/404');
            let html = await response.text();
            document.open();
            document.write(html);
            document.close();
            window.history.replaceState(null, '', path);
        } catch (err) {
            window.location.replace('/404');
        }
    }
})();
    </script>
</head>
</html>
